<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | RU Club Motherland</title>
    <meta name="description" content="The page you're looking for doesn't exist. Return to RU Club Motherland homepage.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://ruclubmotherland.vercel.app/404.html">
    <link rel="icon" href="assets/brand/logo_icon.png">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .error-code {
            font-size: clamp(6rem, 20vw, 12rem);
            font-weight: 900;
            font-family: 'Space Grotesk', sans-serif;
            background: linear-gradient(135deg, var(--brand-primary), var(--brand-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 0.5rem;
        }
        .error-title {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 700;
            margin-bottom: 0.75rem;
        }
        .error-text {
            color: var(--text-secondary);
            font-size: 1.05rem;
            max-width: 450px;
            margin: 0 auto 2rem;
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div>
            <div class="error-code">404</div>
            <h1 class="error-title">Page Not Found</h1>
            <p class="error-text">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
            <a href="index.html" class="btn-primary">Back to Home</a>
            <a href="missions.html" class="btn-secondary" style="margin-left: 0.75rem;">Our Missions</a>
        </div>
    </div>
</body>
</html>
