<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌿 Secret Garden · RU Club Motherland</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="assets/brand/logo_icon.png">
    <link rel="preconnect" href="https://unpkg.com">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        (function() {
            var theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: var(--bg-primary);
            font-family: 'Outfit', sans-serif;
        }
        .garden {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }
        .garden-emoji {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: float 3s ease-in-out infinite;
        }
        .garden-title {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }
        .garden-text {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 500px;
            margin-bottom: 2rem;
            line-height: 1.7;
        }
        .garden .btn-primary {
            display: inline-flex;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .leaf {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            animation: leafFall linear forwards;
            opacity: 0;
        }
        @keyframes leafFall {
            0% {
                opacity: 1;
                transform: translateY(0) rotate(0deg) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(calc(100vh + 100px)) rotate(calc(var(--r) * 1deg)) scale(var(--s));
            }
        }
    </style>
</head>
<body>
    <div class="garden" data-aos="fade-up">
        <div class="garden-emoji">🌿</div>
        <h1 class="garden-title">Secret Garden</h1>
        <p class="garden-text">You found it! A hidden grove of leaves, just for you.<br>— Sincere Bhattarai</p>
        <a href="members.html" class="btn-primary">&larr; Back to Members</a>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 600, once: true });

        const NS = 'http://www.w3.org/2000/svg';
        const colors = ['#0D9488', '#14B8A6', '#CCFBF1', '#059669', '#34D399', '#A7F3D0'];
        const vw = window.innerWidth;

        for (let i = 0; i < 60; i++) {
            const svg = document.createElementNS(NS, 'svg');
            svg.setAttribute('viewBox', '0 0 24 24');
            svg.setAttribute('fill', 'none');
            svg.setAttribute('stroke', colors[Math.floor(Math.random() * colors.length)]);
            svg.setAttribute('stroke-width', '1.5');
            svg.setAttribute('stroke-linecap', 'round');
            svg.setAttribute('stroke-linejoin', 'round');
            svg.innerHTML = '<path d="M11 20A7 7 0 0 1 9.8 6.9C15.5 4.9 17 3.5 19 2c1 2 2 4.5 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/>';

            const size = 16 + Math.random() * 28;
            const delay = Math.random() * 6;
            const duration = 3 + Math.random() * 4;
            const startX = Math.random() * vw;
            const rot = Math.random() * 1080 - 540;
            const scale = 0.3 + Math.random() * 0.9;

            svg.className = 'leaf';
            svg.style.cssText = `
                width:${size}px;height:${size}px;
                left:${startX}px;top:-60px;
                animation-delay:${delay}s;
                animation-duration:${duration}s;
                --r:${rot};--s:${scale};
            `;
            document.body.appendChild(svg);
        }
    </script>
</body>
</html>
