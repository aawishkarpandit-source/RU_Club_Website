    <style>
        html, body { height: 100%; margin: 0; overflow: hidden; background: var(--bg-primary); font-family: 'Outfit', sans-serif; }
        .garden { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; padding: 2rem; position: relative; z-index: 2; }
        .glow-ring { position: absolute; width: 120px; height: 120px; border-radius: 50%; background: radial-gradient(circle, rgba(13,148,136,0.15) 0%, transparent 70%); animation: ringPulse 3s ease-in-out infinite; pointer-events: none; z-index: 0; will-change: transform; }
        @keyframes ringPulse { 0%, 100% { transform: scale(0.8); opacity: 0.4; } 50% { transform: scale(1.8); opacity: 0.8; } }
        .garden-icon { width: 64px; height: 64px; margin-bottom: 1rem; animation: float 3s ease-in-out infinite; position: relative; z-index: 1; cursor: pointer; color: var(--brand-primary); transform: translateZ(0); }
        .garden-icon:hover { transform: scale(1.1); }
        .garden-icon svg { width: 100%; height: 100%; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-16px); } }
        .garden-title { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 800; letter-spacing: -0.02em; color: var(--text-primary); margin-bottom: 0.5rem; background: linear-gradient(135deg, var(--brand-primary) 0%, #0D9488 30%, var(--text-primary) 60%, #0D9488 85%, var(--brand-primary) 100%); background-size: 300% 100%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: shimmer 6s ease-in-out infinite; }
        @keyframes shimmer { 0%, 100% { background-position: 0% 0; } 50% { background-position: 100% 0; } }
        .garden-text { color: var(--text-secondary); font-size: 1.1rem; max-width: 600px; margin-bottom: 2rem; line-height: 1.7; opacity: 0; animation: fadeInUp 1s ease-out 0.5s forwards; }
        @keyframes fadeInUp { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
        .buttons { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; opacity: 0; animation: fadeInUp 1s ease-out 0.8s forwards; }
        .garden .btn-primary, .garden .btn-secondary { display: inline-flex; align-items: center; gap: 0.5rem; }
        .leaf { position: fixed; pointer-events: none; z-index: 0; will-change: transform; animation: leafFall linear forwards; }
        @keyframes leafFall { 0% { opacity: 1; transform: translateY(-40px) rotate(0deg) scale(1); } 100% { opacity: 0; transform: translateY(calc(100vh + 60px)) rotate(calc(var(--r) * 1deg)) scale(var(--s)); } }
        .orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; will-change: transform; animation: orbFloat linear infinite; }
        @keyframes orbFloat { 0% { opacity: 0; transform: translateY(0) scale(0.3); } 15% { opacity: var(--o, 0.2); transform: translateY(0) scale(1); } 85% { opacity: var(--o, 0.2); } 100% { opacity: 0; transform: translateY(calc(-100vh - 80px)) translateX(calc(var(--dx) * 1px)) scale(0.2); } }
        .firefly { position: fixed; width: 3px; height: 3px; border-radius: 50%; background: #A7F3D0; pointer-events: none; z-index: 1; box-shadow: 0 0 4px #A7F3D0; will-change: transform; animation: fireflyMove linear infinite; }
        @keyframes fireflyMove { 0% { opacity: 0; transform: translate(0, 0); } 8% { opacity: 0.6; } 25% { transform: translate(calc(var(--x1) * 1px), calc(var(--y1) * 1px)); opacity: 0.8; } 50% { transform: translate(calc(var(--x2) * 1px), calc(var(--y2) * 1px)); opacity: 0.4; } 75% { transform: translate(calc(var(--x3) * 1px), calc(var(--y3) * 1px)); opacity: 0.7; } 100% { transform: translate(calc(var(--x4) * 1px), calc(var(--y4) * 1px)); opacity: 0; } }
        .sparkle { position: fixed; pointer-events: none; z-index: 1; will-change: transform; animation: sparkleAnim ease-in-out infinite; }
        @keyframes sparkleAnim { 0%, 100% { opacity: 0; transform: scale(0) rotate(0deg); } 50% { opacity: 1; transform: scale(1) rotate(180deg); } }
        .burst-particle { position: fixed; pointer-events: none; z-index: 3; border-radius: 50%; will-change: transform; animation: burstOut 0.8s ease-out forwards; }
        @keyframes burstOut { 0% { opacity: 1; transform: translate(0, 0) scale(1); } 100% { opacity: 0; transform: translate(calc(var(--bx) * 1px), calc(var(--by) * 1px)) scale(0); } }
        .floating-svg { position: fixed; pointer-events: none; z-index: 2; will-change: transform; animation: floatUp 2s ease-out forwards; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-90px) scale(0.4); } }
        .typewriter { display: inline; overflow: hidden; border-right: 2px solid var(--brand-primary); animation: blink 0.75s step-end infinite; font-size: 1.05rem; }
        @keyframes blink { 50% { border-color: transparent; } }
        .message-box { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: var(--radius-xl); padding: 1.25rem 1.75rem; max-width: 380px; margin: 0.75rem 0; box-shadow: var(--shadow-lg); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
        .message-box p { margin: 0.4rem 0; color: var(--text-secondary); line-height: 1.5; font-size: 0.9rem; }
        .message-box .highlight { color: var(--brand-primary); font-weight: 700; }
        .icon-inline { display: inline; width: 14px; height: 14px; vertical-align: middle; margin-right: 2px; }
        .bubble { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; background: radial-gradient(circle at 30% 30%, rgba(13,148,136,0.12), transparent); border: 1px solid rgba(13,148,136,0.08); will-change: transform; animation: bubbleRise linear infinite; }
        @keyframes bubbleRise { 0% { transform: translateY(0) scale(1); opacity: 0; } 15% { opacity: 0.4; } 85% { opacity: 0.3; } 100% { transform: translateY(calc(-100vh - 40px)) scale(0.2); opacity: 0; } }
        .constellation { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; opacity: 0.2; }
        .constellation-dot { position: absolute; width: 2px; height: 2px; border-radius: 50%; background: var(--brand-primary); animation: twinkle 4s ease-in-out infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.15; } 50% { opacity: 0.6; } }
        .constellation-line { position: absolute; height: 1px; background: linear-gradient(90deg, var(--brand-primary), transparent); transform-origin: left center; opacity: 0.1; }
        .scene-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border-light); border-radius: var(--radius-full); padding: 0.4rem 1rem; font-size: 0.8rem; color: var(--text-tertiary); cursor: pointer; transition: all 0.3s ease; margin: 0 0.2rem; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
        .scene-btn:hover, .scene-btn.active { background: var(--brand-primary); color: white; border-color: var(--brand-primary); }
        .badge { position: fixed; top: 1rem; right: 1rem; z-index: 5; background: var(--bg-card); border: 1px solid var(--border-light); border-radius: var(--radius-full); padding: 0.35rem 0.9rem; font-size: 0.7rem; color: var(--brand-primary); font-weight: 600; box-shadow: var(--shadow-md); opacity: 0; animation: fadeInUp 0.6s ease-out 2s forwards; display: flex; align-items: center; gap: 0.35rem; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
        .badge svg { width: 12px; height: 12px; }
        .discovery-log { position: fixed; bottom: 4rem; left: 1rem; z-index: 5; max-width: 220px; }
        .discovery-item { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: var(--radius-lg); padding: 0.4rem 0.65rem; margin-top: 0.3rem; font-size: 0.7rem; color: var(--text-secondary); opacity: 0; animation: fadeInUp 0.4s ease-out forwards; display: flex; align-items: center; gap: 0.4rem; box-shadow: var(--shadow-md); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
        .discovery-item svg { width: 12px; height: 12px; flex-shrink: 0; }
        @media (max-width: 768px) { .garden-text { font-size: 0.95rem; padding: 0 0.5rem; } .message-box { padding: 1rem; margin: 0.75rem 0.25rem; } .typewriter { font-size: 0.85rem; } .discovery-log { display: none; } }
    </style>

<body>
    <main class="garden">
        <div class="glow-ring"></div>
        <div class="garden-icon" id="main-icon" aria-label="Leaf" role="button" tabindex="0">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 20A7 7 0 0 1 9.8 6.9C15.5 4.9 17 3.5 19 2c1 2 2 4.5 2 8 0 5.5-4.78 10-10 10Z"/>

            <p><svg class="icon-inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.9C15.5 4.9 17 3.5 19 2c1 2 2 4.5 2 8 0 5.5-4.78 10-10 10Z"/></svg> <span class="highlight">You found it!</span> This is a hidden corner of the RU Club universe.</p>
            <p><svg class="icon-inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 22L12 12l-5 5 5-5 4 4"/></svg> Every great forest starts with a single seed. Keep planting.</p>
            <p id="click-counter"><svg class="icon-inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l1.5 6.5L20 9l-5 4.5L16.5 20 12 16l-4.5 4L8 13.5 3 9l6.5-.5z"/></svg> Click the leaf <span class="highlight" id="click-num">0</span> times</p>

        <div style="position:fixed;bottom:1rem;left:1rem;z-index:10;display:flex;gap:0.25rem;flex-wrap:wrap;max-width:300px;opacity:0.5;">
            <button class="scene-btn active" data-scene="garden">Garden</button>
            <button class="scene-btn" data-scene="night">Night</button>

    <script>
        const NS = 'http://www.w3.org/2000/svg';
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const leafColors = ['#0D9488', '#14B8A6', '#CCFBF1', '#059669', '#34D399', '#A7F3D0'];
        const sparkColors = ['#A7F3D0', '#6EE7B7', '#34D399', '#FDE68A', '#FCD34D'];

        // Leaf SVG path string
        const leafPath = '<path d="M11 20A7 7 0 0 1 9.8 6.9C15.5 4.9 17 3.5 19 2c1 2 2 4.5 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/>';
        const sparkPath = '<path d="M12 2l1.5 6.5L20 9l-5 4.5L16.5 20 12 16l-4.5 4L8 13.5 3 9l6.5-.5z"/>';

        // Typewriter
        const msg = "Welcome, wanderer. You've discovered the RU Club Secret Garden - a quiet place for those who care.";
        let idx = 0;
        const tw = document.getElementById('typewriter');
        function typeNext() {
            if (idx < msg.length) {
                tw.textContent += msg[idx];
                idx++;
                setTimeout(typeNext, 40 + Math.random() * 30);
            } else {
                tw.style.borderRight = 'none';
            }
        }
        setTimeout(typeNext, 1200);

        // Create SVG element helper
        function makeSVG(path, size, attrs) {
            const svg = document.createElementNS(NS, 'svg');
            svg.setAttribute('viewBox', '0 0 24 24');
            svg.setAttribute('fill', attrs.fill || 'none');
            svg.setAttribute('stroke', attrs.stroke || 'currentColor');
            svg.setAttribute('stroke-width', attrs.strokeWidth || '1.5');
            svg.setAttribute('stroke-linecap', 'round');
            svg.setAttribute('stroke-linejoin', 'round');
            svg.innerHTML = path;
            svg.style.width = size + 'px';
            svg.style.height = size + 'px';
            return svg;
        }

        // Falling leaves (reduced from 80 to 25)
        for (let i = 0; i < 25; i++) {
            const svg = makeSVG(leafPath, 12 + Math.random() * 22, { stroke: leafColors[Math.floor(Math.random() * leafColors.length)] });
            svg.className = 'leaf';
            svg.style.cssText = 'left:' + (Math.random() * vw) + 'px;top:' + (Math.random() * vh * 0.5 - 60) + 'px;animation-delay:' + (Math.random() * 20) + 's;animation-duration:' + (6 + Math.random() * 8) + 's;--r:' + (Math.random() * 720 - 360) + ';--s:' + (0.4 + Math.random() * 0.8) + ';';
            document.body.appendChild(svg);
        }

        // Orbs (reduced from 30 to 12)
        for (let i = 0; i < 12; i++) {
            const orb = document.createElement('div');
            const size = 25 + Math.random() * 60;
            orb.className = 'orb';
            orb.style.cssText = 'width:' + size + 'px;height:' + size + 'px;left:' + (Math.random() * vw) + 'px;bottom:-' + size + 'px;background:radial-gradient(circle, rgba(13,148,136,' + (0.04 + Math.random() * 0.08) + '), transparent);animation-delay:' + (Math.random() * 20) + 's;animation-duration:' + (15 + Math.random() * 20) + 's;--o:' + (0.08 + Math.random() * 0.15) + ';--dx:' + ((Math.random() - 0.5) * 150) + ';';
            document.body.appendChild(orb);
        }

        // Fireflies (reduced from 25 to 8)
        for (let i = 0; i < 8; i++) {
            const ff = document.createElement('div');
            ff.className = 'firefly';
            const range = 100 + Math.random() * 150;
            ff.style.cssText = 'left:' + (Math.random() * vw) + 'px;top:' + (Math.random() * vh) + 'px;animation-delay:' + (Math.random() * 15) + 's;animation-duration:' + (10 + Math.random() * 10) + 's;--x1:' + ((Math.random() - 0.5) * range) + ';--y1:' + ((Math.random() - 0.5) * range) + ';--x2:' + ((Math.random() - 0.5) * range) + ';--y2:' + ((Math.random() - 0.5) * range) + ';--x3:' + ((Math.random() - 0.5) * range) + ';--y3:' + ((Math.random() - 0.5) * range) + ';--x4:' + ((Math.random() - 0.5) * range) + ';--y4:' + ((Math.random() - 0.5) * range) + ';';
            document.body.appendChild(ff);
        }

        // Sparkles (reduced from 35 to 12)
        for (let i = 0; i < 12; i++) {
            const sp = makeSVG(sparkPath, 5 + Math.random() * 8, { stroke: sparkColors[Math.floor(Math.random() * sparkColors.length)] });
            sp.className = 'sparkle';
            sp.style.cssText = 'left:' + (Math.random() * vw) + 'px;top:' + (Math.random() * vh) + 'px;animation-delay:' + (Math.random() * 12) + 's;animation-duration:' + (2 + Math.random() * 4) + 's;';
            document.body.appendChild(sp);
        }

        // Bubbles (reduced from 20 to 8)
        for (let i = 0; i < 8; i++) {
            const b = document.createElement('div');
            b.className = 'bubble';
            const s = 8 + Math.random() * 24;
            b.style.cssText = 'width:' + s + 'px;height:' + s + 'px;left:' + (Math.random() * vw) + 'px;bottom:-10px;animation-delay:' + (Math.random() * 20) + 's;animation-duration:' + (12 + Math.random() * 15) + 's;';
            document.body.appendChild(b);
        }

        // Constellation (reduced from 50 to 20 dots)
        const constEl = document.createElement('div');
        constEl.className = 'constellation';
        const dots = [];
        for (let i = 0; i < 20; i++) {
            const d = document.createElement('div');
            d.className = 'constellation-dot';
            const x = Math.random() * vw;
            const y = Math.random() * vh * 0.6;
            d.style.cssText = 'left:' + x + 'px;top:' + y + 'px;animation-delay:' + (Math.random() * 6) + 's;';
            constEl.appendChild(d);
            dots.push({ x, y });
        }
        for (let i = 0; i < dots.length; i++) {
            for (let j = i + 1; j < dots.length; j++) {
                const dx = dots[i].x - dots[j].x;
                const dy = dots[i].y - dots[j].y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 180 && Math.random() < 0.2) {
                    const line = document.createElement('div');
                    line.className = 'constellation-line';
                    const angle = Math.atan2(dy, dx) * 180 / Math.PI;
                    line.style.cssText = 'left:' + dots[i].x + 'px;top:' + dots[i].y + 'px;width:' + dist + 'px;transform:rotate(' + angle + 'deg);';
                    constEl.appendChild(line);
                }
            }
        }
        document.body.appendChild(constEl);

        // Discovery log
        const discoveryLog = document.createElement('div');
        discoveryLog.className = 'discovery-log';
        document.body.appendChild(discoveryLog);

        function addDiscovery(text, path) {
            const item = document.createElement('div');
            item.className = 'discovery-item';
            if (path) {
                const svg = makeSVG(path, 14, { stroke: 'var(--brand-primary)' });
                item.appendChild(svg);
            }
            const span = document.createElement('span');
            span.textContent = text;
            item.appendChild(span);
            discoveryLog.appendChild(item);
            setTimeout(() => { if (item.parentNode) item.remove(); }, 8000);
            const found = JSON.parse(localStorage.getItem('sg_discoveries') || '[]');
            if (!found.includes(text)) {
                found.push(text);
                localStorage.setItem('sg_discoveries', JSON.stringify(found));
            }
        }

        // Check for returning visitor badge
        const visits = parseInt(localStorage.getItem('sg_visits') || '0') + 1;
        localStorage.setItem('sg_visits', visits);
        if (visits >= 2) {
            const badge = document.createElement('div');
            badge.className = 'badge';
            const svg = makeSVG(sparkPath, 14, { stroke: 'var(--brand-primary)' });
            badge.appendChild(svg);
            const span = document.createElement('span');
            span.textContent = 'Return Visitor x' + visits;
            badge.appendChild(span);
            document.body.appendChild(badge);
        }

        // Achievement badges
        function awardAchievement(name) {
            const key = 'sg_achievement_' + name;
            if (localStorage.getItem(key)) return;
            localStorage.setItem(key, '1');
            addDiscovery('Achievement unlocked: ' + name, sparkPath);
        }

        // Restore discoveries from localStorage
        try {
            const prev = JSON.parse(localStorage.getItem('sg_discoveries') || '[]');
            if (prev.length > 0) {
                addDiscovery('Previously found: ' + prev.length + ' secrets', sparkPath);
            }
        } catch(e) {}

        // Click ripple + burst (reduced from 25 to 10 particles)
        function createBurst(e) {
            const colors = ['#0D9488', '#14B8A6', '#CCFBF1', '#059669', '#34D399', '#A7F3D0', '#FDE68A', '#FCD34D'];
            for (let i = 0; i < 10; i++) {
                const p = document.createElement('div');
                p.className = 'burst-particle';
                const size = 3 + Math.random() * 6;
                const angle = Math.random() * Math.PI * 2;
                const dist = 40 + Math.random() * 100;
                p.style.cssText = 'width:' + size + 'px;height:' + size + 'px;left:' + e.clientX + 'px;top:' + e.clientY + 'px;background:' + colors[Math.floor(Math.random() * colors.length)] + ';animation-duration:' + (0.5 + Math.random() * 0.4) + 's;--bx:' + (Math.cos(angle) * dist) + ';--by:' + (Math.sin(angle) * dist) + ';';
                document.body.appendChild(p);
                setTimeout(function() { p.remove(); }, 1200);
            }
            const ring = document.createElement('div');
            ring.style.cssText = 'position:fixed;left:' + (e.clientX - 20) + 'px;top:' + (e.clientY - 20) + 'px;width:40px;height:40px;border-radius:50%;border:2px solid rgba(13,148,136,0.4);pointer-events:none;z-index:3;animation:rippleOut 0.8s ease-out forwards;';
            document.body.appendChild(ring);
            setTimeout(function() { ring.remove(); }, 1000);
        }
        document.addEventListener('click', function(e) {
            createBurst(e);
            awardAchievement('Discovery');
        });

        // Ripple + shake keyframes injected
        const extraStyle = document.createElement('style');
        extraStyle.textContent = '@keyframes rippleOut { 0% { transform:scale(0.5);opacity:1; } 100% { transform:scale(4);opacity:0; } } @keyframes shake { 0%,100% { transform:translateX(0); } 25% { transform:translateX(-4px); } 75% { transform:translateX(4px); } } @keyframes rainFall { 0% { transform:translateY(0);opacity:0; } 10% { opacity:1; } 100% { transform:translateY(100vh);opacity:0; } } .raindrop { animation:rainFall linear infinite; } @keyframes confettiFall { 0% { opacity:1;transform:translate(0,0) scale(1); } 100% { opacity:0;transform:translate(calc(var(--bx)*1px),calc(var(--by)*1px)) scale(0.3); } }';
        document.head.appendChild(extraStyle);

        // Mouse sparkle trail (throttled to every 300ms)
        let sparkleTimer;
        document.addEventListener('mousemove', function(e) {
            clearTimeout(sparkleTimer);
            sparkleTimer = setTimeout(function() {
                const sp = makeSVG(sparkPath, 4 + Math.random() * 5, { fill: '#A7F3D0' });
                sp.style.cssText = 'position:fixed;left:' + (e.clientX - 2) + 'px;top:' + (e.clientY - 2) + 'px;pointer-events:none;z-index:3;opacity:0.5;animation:sparkleAnim 1.2s ease-in-out forwards;';
                document.body.appendChild(sp);
                setTimeout(function() { sp.remove(); }, 1500);
            }, 300);
        });

        // Leaf icon click counter
        const icon = document.getElementById('main-icon');
        let clickCount = 0;
        const clickNum = document.getElementById('click-num');
        const leafIcons = [leafPath, '<path d="M17 20A5 5 0 0 1 7 17c0-5 3-10 7-12 4 2 7 7 7 12a5 5 0 0 1-4 3Z"/><path d="M12 8v7"/>', '<path d="M12 22c4 0 7-3 7-7 0-5-3-9-7-11-4 2-7 6-7 11 0 4 3 7 7 7Z"/><path d="M12 11v4"/><path d="M9 14l3-3 3 3"/>'];

        icon.addEventListener('click', function(e) {
            clickCount++;
            clickNum.textContent = clickCount;
            e.stopPropagation();

            const path = leafIcons[clickCount % leafIcons.length];
            const svg = makeSVG(path, 26 + Math.random() * 20, { stroke: leafColors[clickCount % leafColors.length] });
            svg.className = 'floating-svg';
            const rect = icon.getBoundingClientRect();
            svg.style.cssText = 'position:fixed;left:' + (rect.left + rect.width / 2 - 13) + 'px;top:' + (rect.top) + 'px;';
            document.body.appendChild(svg);
            setTimeout(function() { svg.remove(); }, 2000);

            if (clickCount === 31) {
                const msg = document.createElement('div');
                msg.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;background:var(--bg-card);border:2px solid var(--brand-primary);border-radius:var(--radius-2xl);padding:2rem 3rem;font-size:1.5rem;font-weight:700;color:var(--brand-primary);text-align:center;box-shadow:0 0 60px rgba(13,148,136,0.3);animation:fadeInUp 0.5s ease-out forwards;';
                msg.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:32px;height:32px;vertical-align:middle;margin-right:8px;"><path d="M11 20A7 7 0 0 1 9.8 6.9C15.5 4.9 17 3.5 19 2c1 2 2 4.5 2 8 0 5.5-4.78 10-10 10Z"/></svg> You are the heart of the forest!';
                document.body.appendChild(msg);
                setTimeout(function() { msg.remove(); }, 3000);
                clickCount = 0;
                clickNum.textContent = '0';
                awardAchievement('Heart of the Forest');
            }
        });

        // Keyboard: type "motherland"
        let typedSeq = '';
        const secretCode = 'motherland';
        document.addEventListener('keydown', function(e) {
            typedSeq += e.key.toLowerCase();
            if (typedSeq.length > secretCode.length) {
                typedSeq = typedSeq.slice(-secretCode.length);
            }
            if (typedSeq === secretCode) {
                typedSeq = '';
                const banner = document.createElement('div');
                banner.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;background:linear-gradient(135deg,#0D9488,#059669);color:white;border-radius:var(--radius-2xl);padding:2.5rem 4rem;font-size:clamp(1.2rem,3vw,2rem);font-weight:700;text-align:center;box-shadow:0 0 80px rgba(13,148,136,0.5);animation:fadeInUp 0.5s ease-out forwards;';
                banner.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:36px;height:36px;vertical-align:middle;margin-right:10px;"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="1"/></svg> Motherland!<br><span style="font-size:0.6em;font-weight:400;opacity:0.9;">You uncovered the secret word. The earth thanks you.</span>';
                document.body.appendChild(banner);
                awardAchievement('Motherland');
                for (let i = 0; i < 30; i++) {
                    const conf = document.createElement('div');
                    const colors = ['#0D9488','#14B8A6','#CCFBF1','#059669','#34D399','#A7F3D0','#FDE68A','#FCD34D'];
                    conf.style.cssText = 'position:fixed;width:' + (6 + Math.random() * 8) + 'px;height:' + (6 + Math.random() * 8) + 'px;left:50%;top:50%;background:' + colors[Math.floor(Math.random() * colors.length)] + ';border-radius:' + (Math.random() > 0.5 ? '50%' : '2px') + ';pointer-events:none;z-index:21;animation:confettiFall ' + (1 + Math.random() * 2) + 's ease-out forwards;--bx:' + ((Math.random() - 0.5) * 600) + ';--by:' + ((Math.random() - 0.5) * 400) + ';';
                    document.body.appendChild(conf);
                    setTimeout(function() { conf.remove(); }, 3000);
                }
                setTimeout(function() { banner.remove(); }, 5000);
            }
        });

        // Secret quotes
        let secretQuoteShown = false;
        const secretQuotes = [
            '"The earth does not belong to us - we belong to the earth." - Chief Seattle',
            '"In every walk with nature, one receives far more than he seeks." - John Muir',
            '"The greatest threat to our planet is the belief that someone else will save it." - Robert Swan',
            '"Be the change you wish to see in the world." - Gandhi',
            '"The forest is not a resource for us - it is life itself." - RU Club Motherland',
            '"Small acts, when multiplied by millions of people, can transform the world." - Howard Zinn'
        ];
        icon.addEventListener('click', function() {
            if (clickCount >= 30 && !secretQuoteShown) {
                secretQuoteShown = true;
                const quoteBox = document.createElement('div');
                const q = secretQuotes[Math.floor(Math.random() * secretQuotes.length)];
                quoteBox.style.cssText = 'position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);z-index:10;background:var(--bg-card);border:2px solid var(--brand-primary);border-radius:var(--radius-xl);padding:1.5rem 2rem;max-width:500px;font-size:0.95rem;color:var(--text-secondary);text-align:center;line-height:1.6;box-shadow:0 0 40px rgba(13,148,136,0.2);animation:fadeInUp 0.6s ease-out forwards;';
                quoteBox.textContent = q;
                document.body.appendChild(quoteBox);
                setTimeout(function() { quoteBox.remove(); }, 6000);
                awardAchievement('Wisdom Seeker');
            }
        });

        // Scene switcher
        document.querySelectorAll('.scene-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.scene-btn').forEach(function(b) { b.classList.remove('active'); });
                btn.classList.add('active');
                const scene = btn.dataset.scene;
                const gardenEl = document.querySelector('.garden');
                const glowRing = document.querySelector('.glow-ring');
                if (scene === 'night') {
                    gardenEl.style.filter = 'hue-rotate(200deg) brightness(0.6) saturate(0.3)';
                    glowRing.style.background = 'radial-gradient(circle, rgba(100,100,255,0.2) 0%, transparent 70%)';
                    if (moonEl) moonEl.style.opacity = '0.6';
                } else if (scene === 'rain') {
                    gardenEl.style.filter = 'hue-rotate(140deg) brightness(0.85) saturate(0.5)';
                    glowRing.style.background = 'radial-gradient(circle, rgba(100,150,200,0.15) 0%, transparent 70%)';
                    if (moonEl) moonEl.style.opacity = '0';
                    if (rainContainer) rainContainer.style.opacity = '0.5';
                } else {
                    gardenEl.style.filter = '';
                    glowRing.style.background = '';
                    if (moonEl) moonEl.style.opacity = '0';
                    if (rainContainer) rainContainer.style.opacity = '0';
                }
            });
        });

        // Moon indicator
        const moonEl = document.createElement('div');
        moonEl.id = 'moon-indicator';
        moonEl.style.cssText = 'position:fixed;top:3rem;right:3rem;width:32px;height:32px;z-index:5;pointer-events:none;opacity:0;transition:opacity 1s ease;color:#e2e8f0;';
        moonEl.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor" width="32" height="32"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
        document.body.appendChild(moonEl);

        // Rain container
        const rainContainer = document.createElement('div');
        rainContainer.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:0;transition:opacity 1s ease;';
        document.body.appendChild(rainContainer);
        for (let i = 0; i < 40; i++) {
            const drop = document.createElement('div');
            drop.className = 'raindrop';
            drop.style.cssText = 'position:absolute;width:1px;height:' + (8 + Math.random() * 16) + 'px;background:linear-gradient(transparent,rgba(13,148,136,0.25));left:' + (Math.random() * 100) + '%;top:-20px;animation-delay:' + (Math.random() * 3) + 's;animation-duration:' + (0.6 + Math.random() * 0.6) + 's;';
            rainContainer.appendChild(drop);
        }

        // Also show rain when rain scene is activated via click propagation fix
        document.querySelector('.scene-btn[data-scene="rain"]').addEventListener('click', function() {
            rainContainer.style.opacity = '0.5';
        });
        document.querySelectorAll('.scene-btn:not([data-scene="rain"])').forEach(function(b) {
            b.addEventListener('click', function() {
                rainContainer.style.opacity = '0';
            });
        });

        // Console welcome
        console.log('%c Welcome to the Secret Garden! ', 'font-size:24px;font-weight:bold;background:#0D9488;color:white;padding:4px 8px;border-radius:4px;');
        console.log('%c Made with love by Sincere Bhattarai ', 'font-size:14px;color:#14B8A6;');
        console.log('%c Tip: try typing "motherland" on your keyboard... ', 'font-size:12px;color:#A7F3D0;');
    </script>
    
    <!-- Vercel Speed Insights -->
    <script>
        window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
