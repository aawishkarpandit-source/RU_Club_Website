<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌿 Secret Garden · RU Club Motherland</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="assets/brand/logo_icon.png">
    <link rel="preconnect" href="https://unpkg.com">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        (function() {
            var theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: var(--bg-primary);
            font-family: 'Outfit', sans-serif;
        }

        .garden {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 2rem;
            position: relative;
            z-index: 2;
        }

        /* ── Pulsing glow ring behind emoji ── */
        .glow-ring {
            position: absolute;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(13,148,136,0.15) 0%, transparent 70%);
            animation: ringPulse 3s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes ringPulse {
            0%, 100% { transform: scale(0.8); opacity: 0.4; }
            50% { transform: scale(1.8); opacity: 0.8; }
        }

        .garden-emoji {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: float 3s ease-in-out infinite;
            position: relative;
            z-index: 1;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-16px); }
        }

        /* ── Shimmer text ── */
        .garden-title {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            background: linear-gradient(
                90deg,
                var(--text-primary) 0%,
                var(--accent, #0D9488) 25%,
                var(--text-primary) 50%,
                var(--accent, #0D9488) 75%,
                var(--text-primary) 100%
            );
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 4s linear infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .garden-text {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 500px;
            margin-bottom: 2rem;
            line-height: 1.7;
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.5s forwards;
        }
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .garden .btn-primary {
            display: inline-flex;
            animation: pulseBtn 2s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }
        .garden .btn-primary::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: inherit;
            background: conic-gradient(
                #0D9488, #14B8A6, #CCFBF1, #059669, #34D399, #0D9488
            );
            z-index: -1;
            animation: spinBorder 3s linear infinite;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .garden .btn-primary:hover::after {
            opacity: 1;
        }
        @keyframes pulseBtn {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.04); }
        }
        @keyframes spinBorder {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .garden .btn-primary:hover {
            animation: none;
            transform: scale(1.06);
        }

        /* ── Leaves (falling) ── */
        .leaf {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            animation: leafFall linear forwards;
            opacity: 0;
        }
        @keyframes leafFall {
            0% {
                opacity: 1;
                transform: translateY(0) rotate(0deg) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(calc(100vh + 120px)) rotate(calc(var(--r) * 1deg)) scale(var(--s));
            }
        }

        /* ── Glowing orbs ── */
        .orb {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: orbFloat linear infinite;
            opacity: 0;
        }
        @keyframes orbFloat {
            0% {
                opacity: 0;
                transform: translateY(0) scale(0.5);
            }
            10% {
                opacity: var(--o, 0.3);
                transform: translateY(0) scale(1);
            }
            90% {
                opacity: var(--o, 0.3);
            }
            100% {
                opacity: 0;
                transform: translateY(calc(-100vh - 100px)) translateX(calc(var(--dx, 0) * 1px)) scale(0.3);
            }
        }

        /* ── Fireflies ── */
        .firefly {
            position: fixed;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #A7F3D0;
            pointer-events: none;
            z-index: 1;
            box-shadow: 0 0 6px #A7F3D0, 0 0 12px rgba(13,148,136,0.4);
            animation: fireflyMove linear infinite;
        }
        @keyframes fireflyMove {
            0% {
                opacity: 0;
                transform: translate(0, 0) scale(0);
            }
            5% {
                opacity: 0.8;
                transform: translate(0, 0) scale(1);
            }
            25% {
                transform: translate(calc(var(--x1) * 1px), calc(var(--y1) * 1px)) scale(1.2);
                opacity: 1;
            }
            50% {
                transform: translate(calc(var(--x2) * 1px), calc(var(--y2) * 1px)) scale(0.8);
                opacity: 0.6;
            }
            75% {
                transform: translate(calc(var(--x3) * 1px), calc(var(--y3) * 1px)) scale(1.1);
                opacity: 0.9;
            }
            95% {
                opacity: 0.8;
            }
            100% {
                transform: translate(calc(var(--x4) * 1px), calc(var(--y4) * 1px)) scale(0);
                opacity: 0;
            }
        }

        /* ── Sparkles ── */
        .sparkle {
            position: fixed;
            pointer-events: none;
            z-index: 1;
            animation: sparkleAnim ease-in-out infinite;
        }
        @keyframes sparkleAnim {
            0%, 100% { opacity: 0; transform: scale(0) rotate(0deg); }
            50% { opacity: 1; transform: scale(1) rotate(180deg); }
        }

        /* ── Click burst particles ── */
        .burst-particle {
            position: fixed;
            pointer-events: none;
            z-index: 3;
            border-radius: 50%;
            animation: burstOut ease-out forwards;
        }
        @keyframes burstOut {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(calc(var(--bx) * 1px), calc(var(--by) * 1px)) scale(0);
            }
        }
    </style>
</head>
<body>
    <div class="garden" data-aos="fade-up">
        <div class="glow-ring"></div>
        <div class="garden-emoji">🌿</div>
        <h1 class="garden-title">Secret Garden</h1>
        <p class="garden-text">You found it! A hidden grove of leaves, just for you.<br>— Sincere Bhattarai</p>
        <a href="members.html" class="btn-primary">&larr; Back to Members</a>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 600, once: true });

        const NS = 'http://www.w3.org/2000/svg';
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const leafColors = ['#0D9488', '#14B8A6', '#CCFBF1', '#059669', '#34D399', '#A7F3D0'];

        // ── 80 Falling Leaves ──
        for (let i = 0; i < 80; i++) {
            const svg = document.createElementNS(NS, 'svg');
            svg.setAttribute('viewBox', '0 0 24 24');
            svg.setAttribute('fill', 'none');
            svg.setAttribute('stroke', leafColors[Math.floor(Math.random() * leafColors.length)]);
            svg.setAttribute('stroke-width', '1.5');
            svg.setAttribute('stroke-linecap', 'round');
            svg.setAttribute('stroke-linejoin', 'round');
            svg.innerHTML = '<path d="M11 20A7 7 0 0 1 9.8 6.9C15.5 4.9 17 3.5 19 2c1 2 2 4.5 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/>';
            const size = 14 + Math.random() * 30;
            svg.className = 'leaf';
            svg.style.cssText = `
                width:${size}px;height:${size}px;
                left:${Math.random() * vw}px;top:-60px;
                animation-delay:${Math.random() * 12}s;
                animation-duration:${4 + Math.random() * 6}s;
                --r:${Math.random() * 1080 - 540};
                --s:${0.3 + Math.random() * 1};
            `;
            document.body.appendChild(svg);
        }

        // ── 30 Glowing Orbs ──
        for (let i = 0; i < 30; i++) {
            const orb = document.createElement('div');
            const size = 30 + Math.random() * 80;
            orb.className = 'orb';
            orb.style.cssText = `
                width:${size}px;height:${size}px;
                left:${Math.random() * vw}px;bottom:-${size}px;
                background: radial-gradient(circle, rgba(13,148,136,${0.05 + Math.random() * 0.1}), transparent);
                box-shadow: 0 0 ${20 + Math.random() * 40}px rgba(13,148,136,${0.05 + Math.random() * 0.08});
                animation-delay:${Math.random() * 15}s;
                animation-duration:${10 + Math.random() * 15}s;
                --o:${0.1 + Math.random() * 0.2};
                --dx:${(Math.random() - 0.5) * 200};
            `;
            document.body.appendChild(orb);
        }

        // ── 20 Fireflies ──
        for (let i = 0; i < 20; i++) {
            const ff = document.createElement('div');
            ff.className = 'firefly';
            const range = 150 + Math.random() * 200;
            ff.style.cssText = `
                left:${Math.random() * vw}px;top:${Math.random() * vh}px;
                animation-delay:${Math.random() * 10}s;
                animation-duration:${6 + Math.random() * 8}s;
                --x1:${(Math.random() - 0.5) * range};
                --y1:${(Math.random() - 0.5) * range};
                --x2:${(Math.random() - 0.5) * range};
                --y2:${(Math.random() - 0.5) * range};
                --x3:${(Math.random() - 0.5) * range};
                --y3:${(Math.random() - 0.5) * range};
                --x4:${(Math.random() - 0.5) * range};
                --y4:${(Math.random() - 0.5) * range};
            `;
            document.body.appendChild(ff);
        }

        // ── 30 Sparkles ──
        for (let i = 0; i < 30; i++) {
            const sp = document.createElementNS(NS, 'svg');
            sp.setAttribute('viewBox', '0 0 24 24');
            sp.setAttribute('fill', 'none');
            sp.setAttribute('stroke', '#A7F3D0');
            sp.setAttribute('stroke-width', '2');
            sp.setAttribute('stroke-linecap', 'round');
            sp.setAttribute('stroke-linejoin', 'round');
            sp.innerHTML = '<path d="M12 2l1.5 6.5L20 9l-5 4.5L16.5 20 12 16l-4.5 4L8 13.5 3 9l6.5-.5z"/>';
            const size = 6 + Math.random() * 10;
            sp.className = 'sparkle';
            sp.style.cssText = `
                width:${size}px;height:${size}px;
                left:${Math.random() * vw}px;top:${Math.random() * vh}px;
                animation-delay:${Math.random() * 8}s;
                animation-duration:${1.5 + Math.random() * 3}s;
                opacity: ${0.2 + Math.random() * 0.3};
            `;
            document.body.appendChild(sp);
        }

        // ── Click Burst ──
        document.addEventListener('click', (e) => {
            const colors = ['#0D9488', '#14B8A6', '#CCFBF1', '#059669', '#34D399', '#A7F3D0', '#FDE68A', '#FCD34D', '#6EE7B7'];
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'burst-particle';
                const size = 4 + Math.random() * 8;
                const angle = Math.random() * Math.PI * 2;
                const dist = 60 + Math.random() * 120;
                p.style.cssText = `
                    width:${size}px;height:${size}px;
                    left:${e.clientX}px;top:${e.clientY}px;
                    background:${colors[Math.floor(Math.random() * colors.length)]};
                    animation-duration:${0.6 + Math.random() * 0.6}s;
                    --bx:${Math.cos(angle) * dist};
                    --by:${Math.sin(angle) * dist};
                `;
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 1500);
            }
        });

        // ── Continuous sparkle rain on mouse move ──
        let sparkleTimer;
        document.addEventListener('mousemove', (e) => {
            clearTimeout(sparkleTimer);
            sparkleTimer = setTimeout(() => {
                const sp = document.createElementNS(NS, 'svg');
                sp.setAttribute('viewBox', '0 0 24 24');
                sp.setAttribute('fill', '#A7F3D0');
                sp.innerHTML = '<path d="M12 2l1.5 6.5L20 9l-5 4.5L16.5 20 12 16l-4.5 4L8 13.5 3 9l6.5-.5z"/>';
                const size = 5 + Math.random() * 6;
                sp.style.cssText = `
                    position:fixed;width:${size}px;height:${size}px;
                    left:${e.clientX - size / 2}px;top:${e.clientY - size / 2}px;
                    pointer-events:none;z-index:3;opacity:0.6;
                    animation: sparkleAnim 0.6s ease-out forwards;
                `;
                document.body.appendChild(sp);
                setTimeout(() => sp.remove(), 800);
            }, 50);
        });
    </script>
</body>
</html>
