<html lang="en">
<head>

    <script type="application/ld+json">

      "@context": "https://schema.org",

    <style>
      .announcement-detail-header {
        padding: calc(var(--header-height) + 4rem) 0 2rem;
        text-align: center;
        background: var(--bg-secondary);
      }
      .announcement-detail-header .announcement-tag {
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: var(--brand-primary);
        margin-bottom: 0.75rem;
      }
      .announcement-detail-header h1 {
        font-size: clamp(2rem, 6vw, 3.5rem);
        font-weight: 800;
        letter-spacing: -0.03em;
        margin-bottom: 0.75rem;
        max-width: 800px;
        margin-left: auto;
        margin-right: auto;
      }
      .announcement-detail-header .announcement-date {
        font-size: 0.9rem;
        color: var(--text-tertiary);
      }
      .announcement-detail-header .announcement-status {
        display: inline-block;
        font-size: 0.65rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        padding: 0.25rem 0.75rem;
        border-radius: var(--radius-full);
        margin-left: 0.5rem;
        vertical-align: middle;
      }
      .announcement-detail-header .announcement-status--ongoing {
        color: #059669;
        background: color-mix(in srgb, #059669 12%, transparent);
      }
      .announcement-detail-header .announcement-status--deadline {
        color: #d97706;
        background: color-mix(in srgb, #d97706 12%, transparent);
      }
      .announcement-detail-header .announcement-status--ended {
        color: #dc2626;
        background: color-mix(in srgb, #dc2626 12%, transparent);
      }
      .announcement-detail-header .announcement-status--urgent {
        color: #e11d48;
        background: color-mix(in srgb, #e11d48 12%, transparent);
        font-weight: 800;
        animation: pulse-red 2s infinite;
      }
      .announcement-detail-header .announcement-status--upcoming {
        color: #2563eb;
        background: color-mix(in srgb, #2563eb 12%, transparent);
      }

      @keyframes pulse-red {
        0% { transform: scale(1); }
        50% { transform: scale(1.05); }
        100% { transform: scale(1); }
      }

      .announcement-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        margin-top: 1rem;
      }
      .announcement-tags .announcement-chip {
        font-size: 0.7rem;
        font-weight: 600;
        color: var(--text-secondary);
        background: var(--bg-secondary);
        padding: 0.25rem 0.6rem;
        border-radius: var(--radius-full);
      }

      .announcement-detail-header .announcement-issuer {
        font-size: 0.85rem;
        color: var(--text-secondary);
        margin-top: 0.5rem;
      }

      .announcement-detail-body {
        padding: 3rem 0;
      }
      .announcement-layout {
        display: grid;
        grid-template-columns: 1fr;
        gap: 3rem;
      }
      @media (min-width: 1024px) {
        .announcement-layout {
          grid-template-columns: 1fr 320px;
        }
      }

      .announcement-image-wrap {
        border-radius: var(--radius-xl);
        overflow: hidden;
        margin-bottom: 2rem;
        aspect-ratio: 16/9;
        background: var(--bg-secondary);
      }
      .announcement-image-wrap img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .announcement-description p {
        font-size: 1.05rem;
        line-height: 1.8;
        color: var(--text-secondary);
        margin-bottom: 1rem;
      }
      .announcement-description p:last-child {
        margin-bottom: 0;
      }

      .announcement-importance {
        background: color-mix(in srgb, var(--brand-primary) 6%, transparent);
        border-radius: var(--radius-lg);
        padding: 1.5rem;
        margin-top: 2rem;
        border-left: 4px solid var(--brand-primary);
      }
      .announcement-importance h3 {
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--brand-primary);
        margin-bottom: 0.5rem;
      }
      .announcement-importance p {
        font-size: 0.95rem;
        line-height: 1.7;
        color: var(--text-secondary);
        margin: 0;
      }

      .announcement-instructions {
        background: var(--bg-card);
        border: 1px solid var(--border-light);
        border-radius: var(--radius-lg);
        padding: 1.5rem;
        margin-top: 1.5rem;
      }
      .announcement-instructions h3 {
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text-tertiary);
        margin-bottom: 0.5rem;
      }
      .announcement-instructions p {
        font-size: 0.95rem;
        line-height: 1.7;
        color: var(--text-secondary);
        margin: 0;
      }

      .announcement-sidebar {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }
      .announcement-sidebar-card {
        background: var(--bg-card);
        border: 1px solid var(--border-light);
        border-radius: var(--radius-xl);
        padding: 1.5rem;
      }
      .announcement-sidebar-card h3 {
        font-size: 0.8rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text-tertiary);
        margin-bottom: 1rem;
      }
      .announcement-meta-item {
        padding: 0.75rem 0;
        border-bottom: 1px solid var(--border-light);
      }
      .announcement-meta-item:last-child {
        border-bottom: none;
      }
      .announcement-meta-label {
        font-size: 0.65rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text-tertiary);
        margin-bottom: 0.15rem;
      }
      .announcement-meta-value {
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--text-primary);
      }
    </style>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "Home", "item": "" },
        { "@type": "ListItem", "position": 2, "name": "Announcements", "item": "/announcements" },
        { "@type": "ListItem", "position": 3, "name": "Announcement", "item": "/announcement" }
      ]
    }
    </script>

</head>
<body>

    <header id="header-placeholder" class="main-header"></header>

    <main id="announcement-content">
        <div class="announcement-detail-header">
            <div class="container">
                <p class="announcement-tag" id="announcement-tag"></p>
                <h1 id="announcement-title"></h1>
                <p>
                  <span class="announcement-date" id="announcement-date"></span>
                  <span class="announcement-status" id="announcement-status" style="display:none;"></span>
                </p>
                <p class="announcement-issuer" id="announcement-issuer"></p>
            </div>
        </div>

        <div class="announcement-detail-body">
            <div class="container">
                <div class="announcement-layout">
                    <div>
                        <div class="announcement-image-wrap" id="announcement-image-wrap" style="display:none;">
                            <img id="announcement-image" src="" alt="" loading="lazy">
                        </div>
                        <div class="announcement-description" id="announcement-description"></div>
                        <div class="announcement-tags" id="announcement-tags" style="display:none;"></div>
                        <div class="announcement-importance" id="announcement-importance" style="display:none;">
                            <h3>Why It Matters</h3>
                            <p id="announcement-importance-text"></p>
                        </div>
                        <div class="announcement-instructions" id="announcement-instructions" style="display:none;">
                            <h3>Instructions</h3>
                            <p id="announcement-instructions-text"></p>
                        </div>
                    </div>
                    <div class="announcement-sidebar">
                        <div class="announcement-sidebar-card">
                            <h3>Details</h3>
                            <div id="announcement-meta"></div>
                        </div>
                        <a href="/announcements" class="btn-secondary" style="text-align:center;">&larr; All Announcements</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer id="footer-placeholder" class="main-footer"></footer>

    <script defer src="/static/js/analytics.js"></script>
    <script defer src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script defer src="/static/js/theme.js"></script>
    <script defer src="/static/js/navigation.js"></script>
    <script defer src="/static/js/animations.js"></script>
    <script defer src="/static/js/carousel.js"></script>
    <script defer src="/static/js/forms.js"></script>
    <script defer src="/static/js/missions.js"></script>
    <script defer src="/static/js/announcements.js"></script>
    <script defer src="/static/js/data-loader.js"></script>
    <script defer src="/static/js/mobile.js"></script>
    <script defer src="/static/js/components.js"></script>
    <script defer src="/static/js/main.js"></script>

    <script>
      document.addEventListener('DOMContentLoaded', async function() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        if (!id) {
          document.getElementById('announcement-content').innerHTML = '<div class="container" style="padding: 6rem 0; text-align:center;"><p>Announcement not found.</p><a href="/announcements" class="btn-primary" style="margin-top:1rem;display:inline-block;">View All Announcements</a></div>';
          document.querySelector('meta[name="robots"]').content = 'noindex, nofollow';
          return;
        }

        let announcement = await Announcements.get(id);
        if (!announcement) {
          document.getElementById('announcement-content').innerHTML = '<div class="container" style="padding: 6rem 0; text-align:center;"><p>Announcement not found.</p><a href="/announcements" class="btn-primary" style="margin-top:1rem;display:inline-block;">View All Announcements</a></div>';
          document.querySelector('meta[name="robots"]').content = 'noindex, nofollow';
          return;
        }

        document.title = announcement.title + ' | RU Club Motherland';
        const desc = announcement.summary || announcement.description;
        document.querySelector('meta[name="description"]').content = desc.substring(0, 160);
        document.querySelector('link[rel="canonical"]').href = '/announcement?id=' + announcement.id;
        document.querySelector('meta[property="og:title"]').content = announcement.title + ' | RU Club Motherland';
        document.querySelector('meta[property="og:description"]').content = desc.substring(0, 160);
        document.querySelector('meta[property="og:url"]').content = '/announcement?id=' + announcement.id;
        document.querySelector('meta[name="twitter:title"]').content = announcement.title + ' | RU Club Motherland';
        document.querySelector('meta[name="twitter:description"]').content = desc.substring(0, 160);

        document.getElementById('announcement-tag').textContent = announcement.tag;
        document.getElementById('announcement-title').textContent = announcement.title;
        
        const statusLabel = { 
          ongoing: 'Ongoing', 
          deadline: 'Deadline', 
          ended: 'Ended',
          urgent: 'Urgent',
          upcoming: 'Upcoming'
        };
        if (announcement.status) {
          const statusEl = document.getElementById('announcement-status');
          statusEl.textContent = statusLabel[announcement.status] || announcement.status;
          statusEl.className = 'announcement-status announcement-status--' + announcement.status;
          statusEl.style.display = 'inline-block';
        }
        
        document.getElementById('announcement-date').textContent = announcement.date + (announcement.day ? ' · ' + announcement.day : '');
        document.getElementById('announcement-issuer').textContent = announcement.issuedBy ? 'Issued by ' + announcement.issuedBy : '';

        const descContainer = document.getElementById('announcement-description');
        descContainer.innerHTML = announcement.description.split('\n').filter(p => p.trim()).map(p => '<p>' + p.trim() + '</p>').join('');

        if (announcement.tags && announcement.tags.length) {
          const tagsEl = document.getElementById('announcement-tags');
          tagsEl.innerHTML = announcement.tags.map(t => '<span class="announcement-chip">' + t + '</span>').join('');
          tagsEl.style.display = 'flex';
        }

        if (announcement.importance) {
          const el = document.getElementById('announcement-importance');
          document.getElementById('announcement-importance-text').textContent = announcement.importance;
          el.style.display = 'block';
        }

        if (announcement.instructions) {
          const el = document.getElementById('announcement-instructions');
          document.getElementById('announcement-instructions-text').textContent = announcement.instructions;
          el.style.display = 'block';
        }

        if (announcement.image) {
          const wrap = document.getElementById('announcement-image-wrap');
          const img = document.getElementById('announcement-image');
          img.src = announcement.image.startsWith('/') ? announcement.image : '/' + announcement.image;
          img.alt = announcement.title;
          wrap.style.display = 'block';
        }

        const metaContainer = document.getElementById('announcement-meta');
        const metaItems = [
          { label: 'Status', value: announcement.status ? statusLabel[announcement.status] : null },
          { label: 'Deadline', value: announcement.deadline },
          { label: 'Date', value: announcement.date },
          { label: 'Day', value: announcement.day },
          { label: 'Time', value: announcement.time },
          { label: 'Location', value: announcement.location },
          { label: 'Issued By', value: announcement.issuedBy }
        ].filter(m => m.value);
        metaContainer.innerHTML = metaItems.map(m => `
          <div class="announcement-meta-item">
            <div class="announcement-meta-label">${m.label}</div>
            <div class="announcement-meta-value">${m.value}</div>
          </div>
        `).join('');
      });
    </script>
</body>
</html>
