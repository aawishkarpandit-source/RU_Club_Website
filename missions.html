    <style>
      .missions-hero {
        padding: calc(var(--header-height) + 4rem) 0 3rem;
        text-align: center;
        background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
      }
      .missions-hero h1 {
        font-size: clamp(2.5rem, 8vw, 4.5rem);
        font-weight: 800;
        letter-spacing: -0.03em;
        margin-bottom: 1rem;
      }
      .missions-hero p {
        font-size: 1.1rem;
        color: var(--text-secondary);
        max-width: 550px;
        margin: 0 auto;
      }
      .missions-stats {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 2rem 3rem;
        margin-top: 2.5rem;
        padding-top: 2rem;
        border-top: 1px solid var(--border-light);
      }
      .missions-stat {
        text-align: center;
      }
      .missions-stat-number {
        font-size: 1.75rem;
        font-weight: 800;
        color: var(--brand-primary);
        font-family: 'Space Grotesk', sans-serif;
      }
      .missions-stat-label {
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text-tertiary);
        margin-top: 0.25rem;
      }
      .missions-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }
      @media (min-width: 640px) {
        .missions-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }
    </style>
</head>
<body>

    <header id="header-placeholder" class="main-header"></header>

    <main>
        <section class="missions-hero">
            <div class="container">
                <h1 data-aos="fade-up">Our Missions</h1>
                <p data-aos="fade-up" data-aos-delay="100">Every mission brings us closer to a sustainable Pokhara. See our impact.</p>
                <div class="missions-stats" data-aos="fade-up" data-aos-delay="200">
                    <div class="missions-stat">
                        <div class="missions-stat-number" id="stat-missions">1</div>
                        <div class="missions-stat-label">Completed Missions</div>
                    </div>
                    <div class="missions-stat">
                        <div class="missions-stat-number" id="stat-volunteers">25+</div>
                        <div class="missions-stat-label">Volunteers Engaged</div>
                    </div>
                    <div class="missions-stat">
                        <div class="missions-stat-number" id="stat-waste">20+</div>
                        <div class="missions-stat-label">Areas Surveyed</div>
                    </div>
                </div>
            </div>
        </section>

        <section>
            <div class="container">
                <div class="missions-grid" id="missions-grid"></div>
            </div>
        </section>

        <section class="bg-secondary">
            <div class="container" style="text-align: center; max-width: 600px; margin: 0 auto;">
                <h2 style="font-size: 1.75rem; margin-bottom: 1rem;" data-aos="fade-up">Join a Mission</h2>
                <p style="color: var(--text-secondary); margin-bottom: 1.5rem;" data-aos="fade-up" data-aos-delay="100">Want to volunteer or suggest a new project? We'd love to hear from you.</p>
                <a href="contact.html" class="btn-primary" data-aos="fade-up" data-aos-delay="200">Get Involved</a>
            </div>
        </section>
    </main>

    <footer id="footer-placeholder" class="main-footer"></footer>

    <script src="js/main.js"></script>
