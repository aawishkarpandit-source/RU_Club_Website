      .announcement-detail-header .announcement-status--upcoming {

      @keyframes pulse-red {

    <script>
      document.addEventListener('DOMContentLoaded', async function() {
        try {
          const params = new URLSearchParams(window.location.search);
          const id = params.get('id');
          if (!id) {
            document.getElementById('announcement-content').innerHTML = '<div class="container" style="padding: 6rem 0; text-align:center;"><p>Announcement not found.</p><a href="/announcements" class="btn-primary" style="margin-top:1rem;display:inline-block;">View All Announcements</a></div>';
            const robots = document.querySelector('meta[name="robots"]');
            if (robots) robots.content = 'noindex, nofollow';
            return;
          }

          let announcement = await Announcements.get(id);
          if (!announcement) {
            document.getElementById('announcement-content').innerHTML = '<div class="container" style="padding: 6rem 0; text-align:center;"><p>Announcement not found.</p><a href="/announcements" class="btn-primary" style="margin-top:1rem;display:inline-block;">View All Announcements</a></div>';
            const robots = document.querySelector('meta[name="robots"]');
            if (robots) robots.content = 'noindex, nofollow';
            return;
          }

          document.title = announcement.title + ' | RU Club Motherland';
          const desc = announcement.summary || announcement.description;
          const safeDesc = desc ? desc.substring(0, 160) : '';

          const metaDesc = document.querySelector('meta[name="description"]');
          if (metaDesc) metaDesc.content = safeDesc;
          const canonical = document.querySelector('link[rel="canonical"]');
          if (canonical) canonical.href = '/announcement?id=' + announcement.id;
          const ogTitle = document.querySelector('meta[property="og:title"]');
          if (ogTitle) ogTitle.content = announcement.title + ' | RU Club Motherland';
          const ogDesc = document.querySelector('meta[property="og:description"]');
          if (ogDesc) ogDesc.content = safeDesc;
          const ogUrl = document.querySelector('meta[property="og:url"]');
          if (ogUrl) ogUrl.content = '/announcement?id=' + announcement.id;
          const twTitle = document.querySelector('meta[name="twitter:title"]');
          if (twTitle) twTitle.content = announcement.title + ' | RU Club Motherland';
          const twDesc = document.querySelector('meta[name="twitter:description"]');
          if (twDesc) twDesc.content = safeDesc;

          const tagEl = document.getElementById('announcement-tag');
          if (tagEl) tagEl.textContent = announcement.tag;
          const titleEl = document.getElementById('announcement-title');
          if (titleEl) titleEl.textContent = announcement.title;

          const statusLabel = { 
            ongoing: 'Ongoing', 
            deadline: 'Deadline', 
            ended: 'Ended',
            urgent: 'Urgent',
            upcoming: 'Upcoming'
          };
          if (announcement.status) {
            const statusEl = document.getElementById('announcement-status');
            if (statusEl) {
              statusEl.textContent = statusLabel[announcement.status] || announcement.status;
              statusEl.className = 'announcement-status announcement-status--' + announcement.status;
              statusEl.style.display = 'inline-block';
            }
          }

          const dateEl = document.getElementById('announcement-date');
          if (dateEl) dateEl.textContent = announcement.date + (announcement.day ? ' · ' + announcement.day : '');
          const issuerEl = document.getElementById('announcement-issuer');
          if (issuerEl) issuerEl.textContent = announcement.issuedBy ? 'Issued by ' + announcement.issuedBy : '';

          const descContainer = document.getElementById('announcement-description');
          if (descContainer && announcement.description) {
            descContainer.innerHTML = announcement.description.split('\n').filter(p => p.trim()).map(p => '<p>' + p.trim() + '</p>').join('');
          }

          if (announcement.tags && announcement.tags.length) {
            const tagsEl = document.getElementById('announcement-tags');
            if (tagsEl) {
              tagsEl.innerHTML = announcement.tags.map(t => '<span class="announcement-chip">' + t + '</span>').join('');
              tagsEl.style.display = 'flex';
            }
          }

          if (announcement.importance) {
            const el = document.getElementById('announcement-importance');
            const textEl = document.getElementById('announcement-importance-text');
            if (el && textEl) {
              textEl.textContent = announcement.importance;
              el.style.display = 'block';
            }
          }

          if (announcement.instructions) {
            const el = document.getElementById('announcement-instructions');
            const textEl = document.getElementById('announcement-instructions-text');
            if (el && textEl) {
              textEl.textContent = announcement.instructions;
              el.style.display = 'block';
            }
          }

          if (announcement.image) {
            const wrap = document.getElementById('announcement-image-wrap');
            const img = document.getElementById('announcement-image');
            if (wrap && img) {
              img.src = announcement.image.startsWith('/') ? announcement.image : '/' + announcement.image;
              img.alt = announcement.title;
              wrap.style.display = 'block';
            }
          }

          const metaContainer = document.getElementById('announcement-meta');
          if (metaContainer) {
            const metaItems = [
              { label: 'Status', value: announcement.status ? statusLabel[announcement.status] : null },
              { label: 'Deadline', value: announcement.deadline },
              { label: 'Date', value: announcement.date },
              { label: 'Day', value: announcement.day },
              { label: 'Time', value: announcement.time },
              { label: 'Location', value: announcement.location },
              { label: 'Issued By', value: announcement.issuedBy }
            ].filter(m => m.value);
            metaContainer.innerHTML = metaItems.map(m => `
              <div class="announcement-meta-item">
                <div class="announcement-meta-label">${m.label}</div>
                <div class="announcement-meta-value">${m.value}</div>
              </div>
            `).join('');
          }
        } catch (e) {
          console.error('Failed to render announcement:', e);
        }
      });
    </script>
