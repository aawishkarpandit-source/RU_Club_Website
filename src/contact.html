<body>

    <!-- Header -->
    <header id="header-placeholder" class="main-header">
        <div class="header-inner skeleton-navbar">
            <div class="skeleton skeleton-icon" style="margin-right:12px;"></div>
            <div class="skeleton skeleton-text" style="width:120px;"></div>
            <div style="flex:1;"></div>
            <div class="skeleton skeleton-nav"></div>
            <div class="skeleton skeleton-nav" style="margin:0 12px;"></div>
            <div class="skeleton skeleton-nav"></div>
            <div class="skeleton skeleton-icon" style="margin-left:12px;"></div>
            <div class="skeleton skeleton-icon"></div>
        </div>
</header>
    <main>
        <!-- Page Header -->
        <section class="page-header">
            <div class="container">
                <h1 class="page-title" data-aos="fade-up">Connect</h1>
                <p class="page-subtitle" data-aos="fade-up" data-aos-delay="100">
                    Partner with us for a sustainable Pokhara.
                </p>
            </div>
        </section>

        <!-- Contact Section -->
        <section>
            <div class="container">
                <div class="contact-grid">
                    <!-- Contact Info Card -->
                    <div class="contact-info" data-aos="fade-right">
                        <h2>Get in Touch</h2>

                            <div class="contact-item">
                                <div class="contact-icon">
                                    <img src="/static/assets/icons/location.svg" alt="" width="20" height="20">
                                </div>
                            <div>
                                <p class="contact-label">Location</p>
                                <p class="contact-value">Motherland Secondary School</p>
                                <p class="contact-value" style="opacity: 0.7;">Pokhara, Nepal</p>
                            </div>
                        </div>

                        <div class="contact-item">
                            <div class="contact-icon">
                                <img src="/static/assets/icons/mail.svg" alt="" width="20" height="20">
                            </div>
                            <div>
                                <p class="contact-label">Email</p>
                                <p class="contact-value">ruclubmotherland@gmail.com</p>
                            </div>
                        </div>

                        <div class="contact-item">
                            <div class="contact-icon">
                                <img src="/static/assets/icons/phone.svg" alt="" width="20" height="20">
                            </div>
                            <div>
                                <p class="contact-label">Phone</p>
                                <p class="contact-value">+977 9856022256</p>
                            </div>
                        </div>
                    </div>

                    <!-- Contact Form -->
                    <div class="contact-form" data-aos="fade-left">
                        <h2>Send a Message</h2>

                        <form id="contact-form" novalidate>
                            <div class="form-row">
                                <div class="form-group">
                                    <label class="form-label">Your Name</label>
                                    <input type="text" name="name" class="form-input" placeholder="Your name" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Email</label>
                                    <input type="email" name="email" class="form-input" placeholder="you@example.com" required>
                                </div>
                            </div>

                            <div class="form-group">
                                <label class="form-label">Message</label>
                                <textarea name="message" class="form-textarea" placeholder="Tell us how you'd like to get involved — ideas, questions, collaborations..." required></textarea>
                            </div>

                            <button type="submit" class="btn-submit">Send Message</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
