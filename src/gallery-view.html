    <style>
      .gv-header {
        padding: calc(var(--header-height) + 4rem) 0 2rem;
        text-align: center;
        background: var(--bg-secondary);
      }
      .gv-header .gv-tag {
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: var(--brand-primary);
        margin-bottom: 0.75rem;
      }
      .gv-header h1 {
        font-size: clamp(2rem, 6vw, 3.5rem);
        font-weight: 800;
        letter-spacing: -0.03em;
        margin-bottom: 0.75rem;
      }
      .gv-header .gv-date {
        font-size: 0.9rem;
        color: var(--text-tertiary);
      }
      .gv-gallery {
        padding: 3rem 0 5rem;
      }
      .gv-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 1rem;
      }
      .gv-grid a {
        display: block;
        border-radius: var(--radius-lg);
        overflow: hidden;
        aspect-ratio: 16/10;
        background: var(--bg-card);
        border: 1px solid var(--border-light);
        transition: var(--transition-base);
      }
      .gv-grid a:hover {
        border-color: var(--brand-light);
        box-shadow: var(--shadow-lg);
        transform: translateY(-4px);
      }
      .gv-grid img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.4s ease;
      }
      .gv-grid a:hover img {
        transform: scale(1.05);
      }
      .gv-back {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 2rem;
        font-size: 0.9rem;
        color: var(--text-secondary);
        text-decoration: none;
        transition: var(--transition-base);
      }
      .gv-back:hover {
        color: var(--brand-primary);
      }
      .gv-empty {
        text-align: center;
        padding: 4rem 0;
        color: var(--text-tertiary);
      }
    </style>

<body>

    <header id="header-placeholder" class="main-header">

            <div class="skeleton skeleton-text" style="width:120px;"></div>
            <div style="flex:1;"></div>
            <div class="skeleton skeleton-nav"></div>
            <div class="skeleton skeleton-nav" style="margin:0 12px;"></div>
            <div class="skeleton skeleton-nav"></div>
            <div class="skeleton skeleton-icon" style="margin-left:12px;"></div>
            <div class="skeleton skeleton-icon"></div>
        </div>
    </header>
    <main id="gv-content">
        <div class="gv-header">
            <div class="container">
                <p class="gv-tag" id="gv-tag"></p>
                <h1 id="gv-title"></h1>
                <p class="gv-date" id="gv-date"></p>
            </div>
        </div>

        <div class="gv-gallery">
            <div class="container">
                <a href="/gallery" class="gv-back" id="gv-back-link">&larr; Back to Gallery</a>
                <div class="gv-grid" id="gv-grid"></div>
                <div class="gv-empty" id="gv-empty" style="display:none;">
                    <p>No photos available for this mission.</p>
                    <a href="/gallery" class="btn-primary" style="margin-top:1rem;display:inline-block;">Back to Gallery</a>
                </div>
            </div>
        </div>
    </main>

    <footer id="footer-placeholder" class="main-footer">

                <div class="skeleton skeleton-text" style="width:150px;"></div>
                <div class="skeleton skeleton-text" style="width:150px;"></div>
            </div>
