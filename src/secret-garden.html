    <style>
        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: var(--bg-primary);
            font-family: 'Outfit', sans-serif;
        }
        .garden {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 2rem;
            position: relative;
            z-index: 2;
        }
        .glow-ring {
            position: absolute;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(13,148,136,0.15) 0%, transparent 70%);
            animation: ringPulse 3s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes ringPulse {
            0%, 100% { transform: scale(0.8); opacity: 0.4; }
            50% { transform: scale(1.8); opacity: 0.8; }
        }
        .garden-emoji {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: float 3s ease-in-out infinite;
            position: relative;
            z-index: 1;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .garden-emoji:hover {
            transform: scale(1.1);
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-16px); }
        }
        .garden-title {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, var(--text-primary) 0%, var(--accent, #0D9488) 25%, var(--text-primary) 50%, var(--accent, #0D9488) 75%, var(--text-primary) 100%);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 4s linear infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .garden-text {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 600px;
            margin-bottom: 2rem;
            line-height: 1.7;
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.5s forwards;
        }
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.8s forwards;
        }
        .garden .btn-primary {
            display: inline-flex;
            position: relative;
            overflow: hidden;
        }
        .garden .btn-secondary {
            display: inline-flex;
        }
        .leaf {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            animation: leafFall linear forwards;
            opacity: 0;
        }
        @keyframes leafFall {
            0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
            100% { opacity: 0; transform: translateY(calc(100vh + 120px)) rotate(calc(var(--r) * 1deg)) scale(var(--s)); }
        }
        .orb {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: orbFloat linear infinite;
            opacity: 0;
        }
        @keyframes orbFloat {
            0% { opacity: 0; transform: translateY(0) scale(0.5); }
            10% { opacity: var(--o, 0.3); transform: translateY(0) scale(1); }
            90% { opacity: var(--o, 0.3); }
            100% { opacity: 0; transform: translateY(calc(-100vh - 100px)) translateX(calc(var(--dx, 0) * 1px)) scale(0.3); }
        }
        .firefly {
            position: fixed;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #A7F3D0;
            pointer-events: none;
            z-index: 1;
            box-shadow: 0 0 6px #A7F3D0, 0 0 12px rgba(13,148,136,0.4);
            animation: fireflyMove linear infinite;
        }
        @keyframes fireflyMove {
            0% { opacity: 0; transform: translate(0, 0) scale(0); }
            5% { opacity: 0.8; transform: translate(0, 0) scale(1); }
            25% { transform: translate(calc(var(--x1) * 1px), calc(var(--y1) * 1px)) scale(1.2); opacity: 1; }
            50% { transform: translate(calc(var(--x2) * 1px), calc(var(--y2) * 1px)) scale(0.8); opacity: 0.6; }
            75% { transform: translate(calc(var(--x3) * 1px), calc(var(--y3) * 1px)) scale(1.1); opacity: 0.9; }
            95% { opacity: 0.8; }
            100% { transform: translate(calc(var(--x4) * 1px), calc(var(--y4) * 1px)) scale(0); opacity: 0; }
        }
        .sparkle {
            position: fixed;
            pointer-events: none;
            z-index: 1;
            animation: sparkleAnim ease-in-out infinite;
        }
        @keyframes sparkleAnim {
            0%, 100% { opacity: 0; transform: scale(0) rotate(0deg); }
            50% { opacity: 1; transform: scale(1) rotate(180deg); }
        }
        .burst-particle {
            position: fixed;
            pointer-events: none;
            z-index: 3;
            border-radius: 50%;
            animation: burstOut ease-out forwards;
        }
        @keyframes burstOut {
            0% { opacity: 1; transform: translate(0, 0) scale(1); }
            100% { opacity: 0; transform: translate(calc(var(--bx) * 1px), calc(var(--by) * 1px)) scale(0); }
        }
        .floating-text {
            position: fixed;
            pointer-events: none;
            z-index: 2;
            font-weight: 700;
            animation: floatUp 2s ease-out forwards;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-100px) scale(0.5); }
        }
        .typewriter {
            display: inline-block;
            overflow: hidden;
            white-space: nowrap;
            border-right: 2px solid var(--brand-primary);
            animation: blink 0.75s step-end infinite;
            font-size: 1.1rem;
        }
        @keyframes blink {
            50% { border-color: transparent; }
        }
        .message-box {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-xl);
            padding: 1.5rem 2rem;
            max-width: 400px;
            margin: 1rem 0;
            box-shadow: var(--shadow-lg);
        }
        .message-box p {
            margin: 0.5rem 0;
            color: var(--text-secondary);
            line-height: 1.6;
        }
        .message-box .highlight {
            color: var(--brand-primary);
            font-weight: 700;
        }
        .bubbles {
            position: fixed;
            bottom: -20px;
            z-index: 0;
            pointer-events: none;
        }
        .bubble {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(13,148,136,0.15), rgba(13,148,136,0.05));
            border: 1px solid rgba(13,148,136,0.1);
            animation: bubbleRise linear infinite;
        }
        @keyframes bubbleRise {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.4; }
            100% { transform: translateY(calc(-100vh - 50px)) scale(0.3); opacity: 0; }
        }
        .constellation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.3;
        }
        .constellation-dot {
            position: absolute;
            width: 2px;
            height: 2px;
            border-radius: 50%;
            background: var(--brand-primary);
            animation: twinkle 3s ease-in-out infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.8; }
        }
        .constellation-line {
            position: absolute;
            height: 1px;
            background: linear-gradient(90deg, var(--brand-primary), transparent);
            transform-origin: left center;
            opacity: 0.15;
        }
        .scene-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-full);
            padding: 0.5rem 1.25rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition-base);
            margin: 0 0.25rem;
        }
        .scene-btn:hover,
        .scene-btn.active {
            background: var(--brand-primary);
            color: white;
            border-color: var(--brand-primary);
        }
        @media (max-width: 768px) {
            .garden-text { font-size: 1rem; padding: 0 1rem; }
            .message-box { padding: 1.25rem; margin: 1rem 0.5rem; }
            .typewriter { font-size: 0.9rem; white-space: normal; }
        }
    </style>

    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://ruclubmss.vercel.app" },

</head>
<body>
    <main class="garden">
        <div class="glow-ring"></div>
        <div class="garden-emoji" role="img" aria-label="Leaf" id="main-emoji">🌿</div>
        <h1 class="garden-title">Secret Garden</h1>
        <p class="garden-text">
            <span class="typewriter" id="typewriter"></span>
        </p>
        <div class="message-box">
            <p>🌱 <span class="highlight">You found it!</span> This is a hidden corner of the RU Club universe.</p>
            <p>🍃 Every great forest starts with a single seed. Keep planting.</p>
            <p id="click-counter">✨ Click the leaf <span class="highlight" id="click-num">0</span> times</p>
        </div>
        <div class="buttons">
            <a href="/" class="btn-secondary">Home</a>
            <a href="/missions" class="btn-primary">Our Missions</a>
        </div>
        <div style="position:fixed;bottom:1rem;left:1rem;z-index:10;display:flex;gap:0.25rem;flex-wrap:wrap;max-width:300px;opacity:0.5;">
            <button class="scene-btn active" data-scene="garden">Garden</button>
            <button class="scene-btn" data-scene="night">Night</button>
            <button class="scene-btn" data-scene="rain">Rain</button>
        </div>
    </main>

    <script>
        const NS = 'http://www.w3.org/2000/svg';
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const leafColors = ['#0D9488', '#14B8A6', '#CCFBF1', '#059669', '#34D399', '#A7F3D0'];
        const msg = "Welcome, wanderer. You've discovered the RU Club Secret Garden — a quiet place for those who care.";
        let idx = 0;
        const tw = document.getElementById('typewriter');
        function typeNext() {
            if (idx < msg.length) {
                tw.textContent += msg[idx];
                idx++;
                setTimeout(typeNext, 40 + Math.random() * 30);
            } else {
                tw.style.borderRight = 'none';
            }
        }
        setTimeout(typeNext, 1200);

        // Falling leaves
        for (let i = 0; i < 80; i++) {
            const svg = document.createElementNS(NS, 'svg');
            svg.setAttribute('viewBox', '0 0 24 24');
            svg.setAttribute('fill', 'none');
            svg.setAttribute('stroke', leafColors[Math.floor(Math.random() * leafColors.length)]);
            svg.setAttribute('stroke-width', '1.5');
            svg.setAttribute('stroke-linecap', 'round');
            svg.setAttribute('stroke-linejoin', 'round');
            svg.innerHTML = '<path d="M11 20A7 7 0 0 1 9.8 6.9C15.5 4.9 17 3.5 19 2c1 2 2 4.5 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/>';
            const size = 14 + Math.random() * 30;
            svg.className = 'leaf';
            svg.style.cssText = `width:${size}px;height:${size}px;left:${Math.random() * vw}px;top:-60px;animation-delay:${Math.random() * 12}s;animation-duration:${4 + Math.random() * 6}s;--r:${Math.random() * 1080 - 540};--s:${0.3 + Math.random() * 1};`;
            document.body.appendChild(svg);
        }

        // Orbs
        for (let i = 0; i < 30; i++) {
            const orb = document.createElement('div');
            const size = 30 + Math.random() * 80;
            orb.className = 'orb';
            orb.style.cssText = `width:${size}px;height:${size}px;left:${Math.random() * vw}px;bottom:-${size}px;background:radial-gradient(circle, rgba(13,148,136,${0.05 + Math.random() * 0.1}), transparent);box-shadow:0 0 ${20 + Math.random() * 40}px rgba(13,148,136,${0.05 + Math.random() * 0.08});animation-delay:${Math.random() * 15}s;animation-duration:${10 + Math.random() * 15}s;--o:${0.1 + Math.random() * 0.2};--dx:${(Math.random() - 0.5) * 200};`;
            document.body.appendChild(orb);
        }

        // Fireflies
        for (let i = 0; i < 25; i++) {
            const ff = document.createElement('div');
            ff.className = 'firefly';
            const range = 150 + Math.random() * 200;
            ff.style.cssText = `left:${Math.random() * vw}px;top:${Math.random() * vh}px;animation-delay:${Math.random() * 10}s;animation-duration:${6 + Math.random() * 8}s;--x1:${(Math.random() - 0.5) * range};--y1:${(Math.random() - 0.5) * range};--x2:${(Math.random() - 0.5) * range};--y2:${(Math.random() - 0.5) * range};--x3:${(Math.random() - 0.5) * range};--y3:${(Math.random() - 0.5) * range};--x4:${(Math.random() - 0.5) * range};--y4:${(Math.random() - 0.5) * range};`;
            document.body.appendChild(ff);
        }

        // Sparkles
        for (let i = 0; i < 35; i++) {
            const sp = document.createElementNS(NS, 'svg');
            sp.setAttribute('viewBox', '0 0 24 24');
            sp.setAttribute('fill', 'none');
            sp.setAttribute('stroke', '#A7F3D0');
            sp.setAttribute('stroke-width', '2');
            sp.innerHTML = '<path d="M12 2l1.5 6.5L20 9l-5 4.5L16.5 20 12 16l-4.5 4L8 13.5 3 9l6.5-.5z"/>';
            const size = 6 + Math.random() * 10;
            sp.className = 'sparkle';
            sp.style.cssText = `width:${size}px;height:${size}px;left:${Math.random() * vw}px;top:${Math.random() * vh}px;animation-delay:${Math.random() * 8}s;animation-duration:${1.5 + Math.random() * 3}s;opacity:${0.2 + Math.random() * 0.3};`;
            document.body.appendChild(sp);
        }

        // Bubbles
        for (let i = 0; i < 20; i++) {
            const b = document.createElement('div');
            b.className = 'bubble';
            const s = 10 + Math.random() * 30;
            b.style.cssText = `width:${s}px;height:${s}px;left:${Math.random() * vw}px;bottom:-20px;animation-delay:${Math.random() * 15}s;animation-duration:${8 + Math.random() * 10}s;`;
            document.body.appendChild(b);
        }

        // Constellation
        const constEl = document.createElement('div');
        constEl.className = 'constellation';
        const dots = [];
        for (let i = 0; i < 50; i++) {
            const d = document.createElement('div');
            d.className = 'constellation-dot';
            const x = Math.random() * vw;
            const y = Math.random() * vh * 0.7;
            d.style.cssText = `left:${x}px;top:${y}px;animation-delay:${Math.random() * 5}s;`;
            constEl.appendChild(d);
            dots.push({ x, y });
        }
        // Connect nearby dots
        for (let i = 0; i < dots.length; i++) {
            for (let j = i + 1; j < dots.length; j++) {
                const dx = dots[i].x - dots[j].x;
                const dy = dots[i].y - dots[j].y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 120 && Math.random() < 0.15) {
                    const line = document.createElement('div');
                    line.className = 'constellation-line';
                    const angle = Math.atan2(dy, dx) * 180 / Math.PI;
                    line.style.cssText = `left:${dots[i].x}px;top:${dots[i].y}px;width:${dist}px;transform:rotate(${angle}deg);`;
                    constEl.appendChild(line);
                }
            }
        }
        document.body.appendChild(constEl);

        // Click burst
        document.addEventListener('click', (e) => {
            const colors = ['#0D9488', '#14B8A6', '#CCFBF1', '#059669', '#34D399', '#A7F3D0', '#FDE68A', '#FCD34D', '#6EE7B7'];
            for (let i = 0; i < 25; i++) {
                const p = document.createElement('div');
                p.className = 'burst-particle';
                const size = 4 + Math.random() * 8;
                const angle = Math.random() * Math.PI * 2;
                const dist = 60 + Math.random() * 150;
                p.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX}px;top:${e.clientY}px;background:${colors[Math.floor(Math.random() * colors.length)]};animation-duration:${0.6 + Math.random() * 0.6}s;--bx:${Math.cos(angle) * dist};--by:${Math.sin(angle) * dist};`;
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 1500);
            }
            // Ripple ring
            const ring = document.createElement('div');
            ring.style.cssText = `position:fixed;left:${e.clientX - 20}px;top:${e.clientY - 20}px;width:40px;height:40px;border-radius:50%;border:2px solid rgba(13,148,136,0.4);pointer-events:none;z-index:3;animation:rippleOut 0.8s ease-out forwards;`;
            document.body.appendChild(ring);
            setTimeout(() => ring.remove(), 1000);
        });

        // Ripple keyframes injected
        const styleSheet = document.createElement('style');
        styleSheet.textContent = `@keyframes rippleOut { 0% { transform:scale(0.5);opacity:1; } 100% { transform:scale(4);opacity:0; } } @keyframes shake { 0%,100% { transform:translateX(0); } 25% { transform:translateX(-4px); } 75% { transform:translateX(4px); } }`;
        document.head.appendChild(styleSheet);

        // Mouse sparkle trail
        let sparkleTimer;
        document.addEventListener('mousemove', (e) => {
            clearTimeout(sparkleTimer);
            sparkleTimer = setTimeout(() => {
                const sp = document.createElementNS(NS, 'svg');
                sp.setAttribute('viewBox', '0 0 24 24');
                sp.setAttribute('fill', '#A7F3D0');
                sp.innerHTML = '<path d="M12 2l1.5 6.5L20 9l-5 4.5L16.5 20 12 16l-4.5 4L8 13.5 3 9l6.5-.5z"/>';
                const size = 5 + Math.random() * 6;
                sp.style.cssText = `position:fixed;width:${size}px;height:${size}px;left:${e.clientX - size / 2}px;top:${e.clientY - size / 2}px;pointer-events:none;z-index:3;opacity:0.6;animation:sparkleAnim 1s ease-in-out forwards;`;
                document.body.appendChild(sp);
                setTimeout(() => sp.remove(), 1500);
            }, 100);
        });

        // Emoji click counter
        const emoji = document.getElementById('main-emoji');
        let clickCount = 0;
        const clickNum = document.getElementById('click-num');
        emoji.addEventListener('click', () => {
            clickCount++;
            clickNum.textContent = clickCount;
            const msgs = ['🌿', '🍃', '🌱', '🌾', '💚', '✨', '🌟', '🌈', '🌸', '🦋', '🐝', '☘️'];
            const txt = document.createElement('div');
            txt.className = 'floating-text';
            txt.textContent = msgs[clickCount % msgs.length];
            const rect = emoji.getBoundingClientRect();
            txt.style.cssText = `left:${rect.left + rect.width / 2}px;top:${rect.top}px;font-size:${26 + Math.random() * 20}px;color:${leafColors[clickCount % leafColors.length]};`;
            document.body.appendChild(txt);
            setTimeout(() => txt.remove(), 2000);

            if (clickCount === 31) {
                const msg = document.createElement('div');
                msg.style.cssText = `position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;background:var(--bg-card);border:2px solid var(--brand-primary);border-radius:var(--radius-2xl);padding:2rem 3rem;font-size:1.5rem;font-weight:700;color:var(--brand-primary);text-align:center;box-shadow:0 0 60px rgba(13,148,136,0.3);animation:fadeInUp 0.5s ease-out forwards;`;
                msg.innerHTML = '🌿 You are the heart of the forest! 🌿';
                document.body.appendChild(msg);
                setTimeout(() => msg.remove(), 3000);
                clickCount = 0;
                clickNum.textContent = '0';
            }
        });

        // Scene switcher
        document.querySelectorAll('.scene-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.scene-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const scene = btn.dataset.scene;
                if (scene === 'night') {
                    document.querySelector('.garden').style.filter = 'hue-rotate(200deg) brightness(0.6) saturate(0.3)';
                    document.querySelector('.glow-ring').style.background = 'radial-gradient(circle, rgba(100,100,255,0.2) 0%, transparent 70%)';
                } else if (scene === 'rain') {
                    document.querySelector('.garden').style.filter = 'hue-rotate(140deg) brightness(0.85) saturate(0.5)';
                    document.querySelector('.glow-ring').style.background = 'radial-gradient(circle, rgba(100,150,200,0.15) 0%, transparent 70%)';
                } else {
                    document.querySelector('.garden').style.filter = '';
                    document.querySelector('.glow-ring').style.background = '';
                }
            });
        });

        // === Keyboard easter egg: type "motherland" ===
        let typedSeq = '';
        const secretCode = 'motherland';
        document.addEventListener('keydown', (e) => {
            typedSeq += e.key.toLowerCase();
            if (typedSeq.length > secretCode.length) {
                typedSeq = typedSeq.slice(-secretCode.length);
            }
            if (typedSeq === secretCode) {
                typedSeq = '';
                const banner = document.createElement('div');
                banner.style.cssText = `position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;background:linear-gradient(135deg,#0D9488,#059669);color:white;border-radius:var(--radius-2xl);padding:2.5rem 4rem;font-size:clamp(1.2rem,3vw,2rem);font-weight:700;text-align:center;box-shadow:0 0 80px rgba(13,148,136,0.5);animation:fadeInUp 0.5s ease-out forwards;`;
                banner.innerHTML = '🌍 Motherland!<br><span style="font-size:0.6em;font-weight:400;opacity:0.9;">You uncovered the secret word. The earth thanks you.</span>';
                document.body.appendChild(banner);
                // Confetti burst
                for (let i = 0; i < 60; i++) {
                    const conf = document.createElement('div');
                    const colors = ['#0D9488','#14B8A6','#CCFBF1','#059669','#34D399','#A7F3D0','#FDE68A','#FCD34D'];
                    conf.style.cssText = `position:fixed;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;left:50%;top:50%;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>0.5?'50%':'2px'};pointer-events:none;z-index:21;animation:confettiFall ${1+Math.random()*2}s ease-out forwards;--bx:${(Math.random()-0.5)*600};--by:${(Math.random()-0.5)*400};`;
                    document.body.appendChild(conf);
                    setTimeout(() => conf.remove(), 3000);
                }
                setTimeout(() => banner.remove(), 5000);
            }
        });

        // === Visitor badge (localStorage) ===
        const visits = parseInt(localStorage.getItem('sg_visits') || '0') + 1;
        localStorage.setItem('sg_visits', visits);
        if (visits >= 3) {
            const badge = document.createElement('div');
            badge.style.cssText = `position:fixed;top:1rem;right:1rem;z-index:5;background:var(--bg-card);border:1px solid var(--border-light);border-radius:var(--radius-full);padding:0.4rem 1rem;font-size:0.75rem;color:var(--brand-primary);font-weight:600;box-shadow:var(--shadow-md);opacity:0;animation:fadeInUp 0.6s ease-out 2s forwards;`;
            badge.innerHTML = '🌿 Return Visitor ×' + visits;
            document.body.appendChild(badge);
        }

        // === Hidden quote after 30 leaf clicks ===
        let secretQuotes = [
            '"The earth does not belong to us — we belong to the earth." — Chief Seattle',
            '"In every walk with nature, one receives far more than he seeks." — John Muir',
            '"The greatest threat to our planet is the belief that someone else will save it." — Robert Swan',
            '"Be the change you wish to see in the world." — Gandhi',
            '"The forest is not a resource for us — it is life itself." — RU Club Motherland',
            '"Small acts, when multiplied by millions of people, can transform the world." — Howard Zinn'
        ];
        const originalClickHandler = emoji.click;
        let secretQuoteShown = false;
        emoji.addEventListener('click', () => {
            if (clickCount >= 30 && !secretQuoteShown) {
                secretQuoteShown = true;
                const quoteBox = document.createElement('div');
                const q = secretQuotes[Math.floor(Math.random() * secretQuotes.length)];
                quoteBox.style.cssText = `position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);z-index:10;background:var(--bg-card);border:2px solid var(--brand-primary);border-radius:var(--radius-xl);padding:1.5rem 2rem;max-width:500px;font-size:0.95rem;color:var(--text-secondary);text-align:center;line-height:1.6;box-shadow:0 0 40px rgba(13,148,136,0.2);animation:fadeInUp 0.6s ease-out forwards;`;
                quoteBox.textContent = q;
                document.body.appendChild(quoteBox);
                setTimeout(() => quoteBox.remove(), 6000);
            }
        });

        // === Moon phase indicator (night scene enhancement) ===
        const moonEl = document.createElement('div');
        moonEl.id = 'moon-indicator';
        moonEl.style.cssText = 'position:fixed;top:3rem;right:3rem;font-size:2rem;z-index:5;pointer-events:none;opacity:0;transition:opacity 1s ease;';
        moonEl.textContent = '🌙';
        document.body.appendChild(moonEl);

        // Enhance scene switcher to show/hide moon
        document.querySelectorAll('.scene-btn').forEach(btn => {
            const origClick = btn.click;
            btn.addEventListener('click', () => {
                if (btn.dataset.scene === 'night') {
                    moonEl.style.opacity = '0.6';
                } else {
                    moonEl.style.opacity = '0';
                }
            });
        });

        // === Rain drop enhancement for rain scene ===
        const rainContainer = document.createElement('div');
        rainContainer.id = 'rain-container';
        rainContainer.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:0;transition:opacity 1s ease;';
        document.body.appendChild(rainContainer);

        // Add rain drops (hidden by default)
        for (let i = 0; i < 100; i++) {
            const drop = document.createElement('div');
            drop.className = 'raindrop';
            drop.style.cssText = `position:absolute;width:1px;height:${10+Math.random()*20}px;background:linear-gradient(transparent,rgba(13,148,136,0.3));left:${Math.random()*100}%;top:-20px;animation-delay:${Math.random()*2}s;animation-duration:${0.5+Math.random()*0.5}s;`;
            rainContainer.appendChild(drop);
        }

        // Inject rain keyframes
        const rainStyle = document.createElement('style');
        rainStyle.textContent = `@keyframes rainFall { 0% { transform:translateY(0);opacity:0; } 10% { opacity:1; } 100% { transform:translateY(100vh);opacity:0; } } .raindrop { animation:rainFall linear infinite; } @keyframes confettiFall { 0% { opacity:1;transform:translate(0,0) scale(1); } 100% { opacity:0;transform:translate(calc(var(--bx)*1px),calc(var(--by)*1px)) scale(0.3); } }`;
        document.head.appendChild(rainStyle);

        // Also show rain on rain scene
        const origSceneHandler = document.querySelector('.scene-btn[data-scene="rain"]');
        if (origSceneHandler) {
            origSceneHandler.addEventListener('click', () => {
                rainContainer.style.opacity = '0.5';
            });
        }
        document.querySelectorAll('.scene-btn:not([data-scene="rain"])').forEach(b => {
            b.addEventListener('click', () => {
                rainContainer.style.opacity = '0';
            });
        });

        console.log('%c🌿 Welcome to the Secret Garden!', 'font-size:24px;font-weight:bold;color:#0D9488;');
        console.log('%cMade with ♡ by Sincere Bhattarai', 'font-size:14px;color:#14B8A6;');
        console.log('%c🔑 Try typing "motherland" on your keyboard...', 'font-size:12px;color:#A7F3D0;');
    </script>
</body>
</html>
