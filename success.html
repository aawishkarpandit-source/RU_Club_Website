<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent | RU Club Motherland</title>
    <meta name="description" content="Your message has been sent successfully. Thank you for contacting RU Club Motherland.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://ruclubmotherland.vercel.app/success.html">
    <meta property="og:title" content="Message Sent | RU Club Motherland">
    <meta property="og:description" content="Your message has been sent successfully.">
    <meta property="og:url" content="https://ruclubmotherland.vercel.app/success.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="RU Club Motherland">
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="icon" href="assets/brand/logo_icon.png">
    <script>
        (function() {
            var theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <script defer src="js/analytics.js"></script>
    <style>
        .status-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .status-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            font-size: 2rem;
        }
        .status-icon.success {
            background: #D1FAE5;
            color: #059669;
        }
        .status-title {
            font-size: clamp(1.75rem, 4vw, 2.5rem);
            font-weight: 800;
            margin-bottom: 0.75rem;
        }
        .status-text {
            color: var(--text-secondary);
            font-size: 1.05rem;
            max-width: 450px;
            margin: 0 auto 2rem;
            line-height: 1.7;
        }
        .status-actions {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div class="status-page">
        <div data-aos="fade-up">
            <div class="status-icon success">&#10003;</div>
            <h1 class="status-title">Message Sent!</h1>
            <p class="status-text">Thank you for reaching out. We've received your message and will get back to you as soon as possible.</p>
            <div class="status-actions">
                <a href="index.html" class="btn-primary">Back to Home</a>
                <a href="missions.html" class="btn-secondary">Our Missions</a>
            </div>
        </div>
    </div>

    <script defer src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script defer src="js/theme.js"></script>
    <script defer src="js/animations.js"></script>
</body>
</html>
