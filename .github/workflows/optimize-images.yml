name: Optimize Images

on:
  push:
    branches: [main]
    paths:
      - 'src/**/*.jpg'
      - 'src/**/*.jpeg'
      - 'src/**/*.png'
      - 'src/**/*.webp'
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y jpegoptim optipng libwebp-bin

      - name: Compress JPEG images
        run: |
          find src -name '*.jpg' -o -name '*.jpeg' | while read img; do
            jpegoptim --strip-all --max=80 --all-progressive "$img"
          done

      - name: Compress PNG images
        run: |
          find src -name '*.png' | while read img; do
            optipng -o3 -strip all "$img"
          done

      - name: Generate WebP for large images
        run: |
          find src -name '*.jpg' -o -name '*.jpeg' -o -name '*.png' | while read img; do
            dir=$(dirname "$img")
            base=$(basename "$img")
            name="${base%.*}"
            out="$dir/${name}.webp"
            if [ ! -f "$out" ]; then
              cwebp -q 80 "$img" -o "$out"
            fi
          done

      - name: Commit optimized images
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Image Optimizer"
          git add -A
          git diff --quiet --cached || git commit -m "Auto-optimize images [skip ci]"
          git push