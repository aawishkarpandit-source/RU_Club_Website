name: Auto-Discover Missions

on:
  push:
    branches: [main]
    paths:
      - 'mission/**'
      - '!mission/list.json'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan mission folders and build list.json
        run: |
          python3 << 'PYEOF'
          import json, re
          from pathlib import Path

          MISSION = Path("mission")
          LIST_PATH = MISSION / "list.json"

          existing = {}
          if LIST_PATH.exists():
              with open(LIST_PATH) as f:
                  data = json.load(f)
                  for m in data.get("missions", []):
                      existing[m["slug"]] = m

          missions = []
          for folder in sorted(MISSION.iterdir()):
              if not folder.is_dir() or folder.name.startswith("."):
                  continue
              info_file = folder / "info.json"
              if not info_file.exists():
                  images_list = sorted([f.name for f in folder.iterdir() if f.suffix.lower() in ('.jpg','.jpeg','.png','.webp')])
                  if not images_list:
                      print(f"⚠️  Skipping {folder.name}: no info.json and no images")
                      continue
                  info = {
                      "title": folder.name.replace("-", " ").title(),
                      "description": f"Mission in {folder.name.replace('-', ' ')}",
                      "tag": "Mission",
                      "date": "",
                      "detail": "",
                      "show": True
                  }
                  info_file.write_text(json.dumps(info, indent=2, ensure_ascii=False) + "\n")
                  print(f"📝  Created info.json for {folder.name}")
              else:
                  info = json.loads(info_file.read_text())
              slug = re.sub(r'[^a-z0-9-]', '', (info.get("slug") or folder.name).lower().replace(' ', '-'))

              image_exts = {"*.jpg", "*.jpeg", "*.png", "*.webp"}
              images = []
              for ext in sorted(image_exts):
                  images.extend(sorted(folder.glob(ext)))
              image_count = len(images)

              # Preserve show flag: use explicit bool from info.json, fall back to existing list, default True
              show = info.get("show")
              if not isinstance(show, bool):
                  show = existing.get(slug, {}).get("show", True)

              mission = {
                  "slug": slug,
                  "id": slug,
                  "title": info.get("title", folder.name.replace("-", " ").title()),
                  "description": info.get("description", ""),
                  "tag": info.get("tag", ""),
                  "date": info.get("date", ""),
                  "detail": info.get("detail", ""),
                  "show": show
              }

              if slug in existing:
                  for k, v in existing[slug].items():
                      if k not in mission:
                          mission[k] = v

              missions.append(mission)
              print(f"✅  {slug}: {mission['title']} ({image_count} images)")

          missions.sort(key=lambda m: m.get("date", ""), reverse=True)
          LIST_PATH.write_text(json.dumps({"missions": missions}, indent=2, ensure_ascii=False) + "\n")
          print(f"\n✔  list.json updated — {len(missions)} missions")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "Mission Bot"
          git config user.email "bot@ruclubmss.vercel.app"
          git add mission/list.json mission/*/info.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-update mission list"
            git push
          fi
