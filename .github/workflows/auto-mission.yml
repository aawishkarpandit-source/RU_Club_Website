name: Auto-Discover Missions

on:
  push:
    branches: [main]
    paths:
      - 'mission/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan-missions:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Scan mission folders and update data
        run: |
          LIST="mission/list.json"
          echo '{"missions":[]}' > "$LIST"

          for dir in mission/*/; do
            [ -d "$dir" ] || continue
            folder=$(basename "$dir")
            # Skip hidden folders and list.json itself
            [[ "$folder" == .* ]] && continue
            info="$dir/info.json"
            [ -f "$info" ] || continue

            # Generate clean slug from folder name
            slug=$(echo "$folder" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//;s/-$//')

            title=$(jq -r '.title // "New Mission"' "$info")
            tag=$(jq -r '.tag // "Mission"' "$info")
            date=$(jq -r '.date // ""' "$info")
            desc=$(jq -r '.description // ""' "$info")
            detail=$(jq -r '.detail // ""' "$info")

            # Pick first image as featured
            img_list=$(jq -r '.images[]' "$info" 2>/dev/null | head -1)
            if [ -z "$img_list" ]; then
              img_list=$(ls "$dir"*.jpg "$dir"*.png "$dir"*.jpeg "$dir"*.webp 2>/dev/null | head -1)
              [ -n "$img_list" ] && featured="mission/$folder/$(basename "$img_list")" || featured=""
            else
              featured="mission/$folder/$img_list"
            fi
            [ -z "$featured" ] && continue

            img_count=$(jq '.images | length' "$info" 2>/dev/null || echo 0)
            show=$(jq '.show // true' "$info")

            jq --arg id "$folder" \
               --arg slug "$slug" \
               --arg title "$title" \
               --arg tag "$tag" \
               --arg date "$date" \
               --arg desc "$desc" \
               --arg detail "$detail" \
               --argjson imgcount "$img_count" \
               --arg featured "$featured" \
               --argjson show "$show" \
               '.missions += [{id:$id, slug:$slug, title:$title, tag:$tag, date:$date, description:$desc, detail:$detail, imageCount:$imgcount, featured:$featured, show:$show}]' "$LIST" > tmp.json && mv tmp.json "$LIST"
          done

          echo "Mission scan complete."

      - name: Commit and push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --quiet HEAD; then
            git commit -m "auto: discover and register new missions"
            git push
            echo "Changes committed and pushed."
          else
            echo "No changes to commit."
          fi
